name: Mac OS con Bore (Vero VNC)

on:
  workflow_dispatch:

jobs:
  macos-desktop:
    runs-on: macos-latest
    timeout-minutes: 60

    steps:
      # ─── 1. Attiva lo Screen Sharing nativo di Apple ─────────────────────
      - name: Enable Apple Remote Desktop
        run: |
          sudo /System/Library/CoreServices/RemoteManagement/ARDAgent.app/Contents/Resources/kickstart -activate -configure -access -on -restart -agent -privs -all
          sudo /System/Library/CoreServices/RemoteManagement/ARDAgent.app/Contents/Resources/kickstart -configure -clientopts -setvncpasswd -vncpasswd Simona26
          echo "✅ VNC Apple pronto sulla porta 5900!"

      # ─── 2. Scarica e avvia il tunnel Bore (Nessun account, 2 secondi) ───
      - name: Start Bore Tunnel
        run: |
          # Scarichiamo il programmino leggero di Bore per Mac
          curl -LO https://github.com/ekmett/bore/releases/download/v0.5.1/bore-v0.5.1-x86_64-apple-darwin.tar.gz
          tar -xzf bore-v0.5.1-x86_64-apple-darwin.tar.gz
          
          # Avviamo il tunnel sulla porta del VNC (5900) verso il server pubblico gratuito di bore
          nohup ./bore local 5900 --to bore.pub </dev/null >/tmp/bore.log 2>&1 &
          sleep 5

      # ─── 3. Leggi il log e mostra l'indirizzo esatto ─────────────────────
      - name: Get Connection Link
        run: |
          cat /tmp/bore.log
          # Estraiamo l'indirizzo esatto assegnato da Bore (es. bore.pub:12345)
          BORE_URL=$(grep -oE "bore.pub:[0-9]+" /tmp/bore.log | head -n 1)
          
          echo "╔══════════════════════════════════════════════════════════════╗"
          echo "║       🍏 IL TUO MAC IN CLOUD È PRONTO (STAVOLTA DAVVERO!)     ║"
          echo "╠══════════════════════════════════════════════════════════════╣"
          echo "║                                                              ║"
          echo "║  Apri l'app RealVNC Viewer sul tuo iPhone e inserisci:       ║"
          echo "║                                                              ║"
          echo "║  👉 INDIRIZZO:  $BORE_URL                                    ║"
          echo "║  👉 PASSWORD:   Simona26                                     ║"
          echo "║                                                              ║"
          echo "╚══════════════════════════════════════════════════════════════╝"

      # ─── 4. Mantieni vivo il Mac ─────────────────────────────────────────
      - name: Keep Alive
        run: sleep 3600
