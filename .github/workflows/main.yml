name: Windows VM

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: windows-latest   # oppure windows-2022 / windows-2019 per versioni specifiche

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Mostra info sistema
        shell: powershell
        run: |
          Get-ComputerInfo | Select-Object WindowsProductName, OsVersion
          $env:PATH

      - name: Esempio comando PowerShell
        shell: powershell
        run: |
          Write-Host "Ciao dalla VM Windows!"
