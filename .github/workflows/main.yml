name: macOS Desktop (Xvfb + fluxbox + x11vnc + noVNC)

on:
  workflow_dispatch:
    inputs:
      session_duration:
        description: "Durata sessione in minuti (max 360)"
        required: false
        default: "60"
        type: string
      vnc_password:
        description: "Password VNC (lascia vuoto per auto-generata)"
        required: false
        default: ""
        type: string

jobs:
  remote-desktop:
    runs-on: macos-latest
    timeout-minutes: 360

    steps:
      # ─── 1. Installa tutto ───────────────────────────────────────────────────
      - name: Install dependencies
        run: |
          brew install xquartz x11vnc fluxbox 2>&1 | tail -20 || true

          # noVNC via git
          git clone --depth 1 https://github.com/novnc/noVNC.git /tmp/noVNC
          git clone --depth 1 https://github.com/novnc/websockify /tmp/noVNC/utils/websockify

          echo "✅ Dipendenze installate"

      # ─── 2. Avvia Xvfb (display virtuale) ───────────────────────────────────
      - name: Start virtual display
        run: |
          # Xvfb crea un display virtuale senza bisogno di hardware
          XVFB=$(find /opt/X11 /usr/X11 -name Xvfb 2>/dev/null | head -1)
          echo "Xvfb path: $XVFB"

          nohup "$XVFB" :99 -screen 0 1280x800x24 > /tmp/xvfb.log 2>&1 &
          sleep 3

          export DISPLAY=:99
          echo "DISPLAY=:99" >> "$GITHUB_ENV"
          echo "✅ Display virtuale :99 avviato"

      # ─── 3. Avvia fluxbox (desktop leggero) ─────────────────────────────────
      - name: Start fluxbox desktop
        run: |
          export DISPLAY=:99
          nohup fluxbox > /tmp/fluxbox.log 2>&1 &
          sleep 3
          echo "✅ Fluxbox avviato"

      # ─── 4. Avvia x11vnc sul display virtuale ───────────────────────────────
      - name: Start x11vnc
        run: |
          if [ -n "${{ github.event.inputs.vnc_password }}" ]; then
            VNC_PASS="${{ github.event.inputs.vnc_password }}"
          else
            VNC_PASS="$(openssl rand -hex 4)"
          fi
          echo "VNC_PASS=$VNC_PASS" >> "$GITHUB_ENV"

          export DISPLAY=:99
          nohup x11vnc \
            -display :99 \
            -passwd "$VNC_PASS" \
            -forever \
            -shared \
            -rfbport 5900 \
            > /tmp/x11vnc.log 2>&1 &

          sleep 5
          echo "=== x11vnc log ==="
          cat /tmp/x11vnc.log | head -20

          pgrep -q x11vnc && echo "✅ x11vnc attivo sulla porta 5900" \
                          || echo "❌ x11vnc non avviato"

      # ─── 5. Avvia noVNC ─────────────────────────────────────────────────────
      - name: Start noVNC
        run: |
          nohup python3 /tmp/noVNC/utils/novnc_proxy \
            --vnc localhost:5900 \
            --listen 6080 \
            > /tmp/novnc.log 2>&1 &

          sleep 5
          pgrep -f novnc_proxy && echo "✅ noVNC attivo sulla porta 6080" \
                                || echo "❌ noVNC non avviato"
          cat /tmp/novnc.log | head -10

      # ─── 6. Tunnel localhost.run ─────────────────────────────────────────────
      - name: Start tunnel
        run: |
          ssh-keygen -t ed25519 -f /tmp/tunnel_key -N "" -q

          nohup ssh \
            -i /tmp/tunnel_key \
            -o StrictHostKeyChecking=no \
            -o ServerAliveInterval=30 \
            -o ServerAliveCountMax=10 \
            -R 80:localhost:6080 \
            nokey@localhost.run \
            > /tmp/tunnel.log 2>&1 &

          echo "Attendo URL tunnel..."
          for i in $(seq 1 30); do
            sleep 2
            URL=$(grep -oE 'https://[a-zA-Z0-9.-]+\.lhr\.life' /tmp/tunnel.log | head -1)
            if [ -n "$URL" ]; then
              echo "TUNNEL_URL=$URL" >> "$GITHUB_ENV"
              echo "✅ Tunnel attivo!"
              break
            fi
            echo -n "."
          done
          echo ""
          cat /tmp/tunnel.log

      # ─── 7. Mostra credenziali ──────────────────────────────────────────────
      - name: Display connection info
        run: |
          SESSION_DURATION="${{ github.event.inputs.session_duration }}"
          END_TIME=$(date -v+"${SESSION_DURATION}M" "+%H:%M UTC")

          echo ""
          echo "╔══════════════════════════════════════════════════════════════╗"
          echo "║       🖥️  DESKTOP REMOTO PRONTO – APRI NEL BROWSER           ║"
          echo "╠══════════════════════════════════════════════════════════════╣"
          echo "║                                                              ║"
          echo "║  👉 ${TUNNEL_URL}/vnc.html?autoconnect=true&password=${VNC_PASS}"
          echo "║                                                              ║"
          printf "║  🔑 Password VNC :  %-41s║\n" "$VNC_PASS"
          printf "║  ⏱️  Attivo fino  :  %-41s║\n" "$END_TIME"
          echo "╚══════════════════════════════════════════════════════════════╝"
          echo ""
          echo "::add-mask::$VNC_PASS"

      # ─── 8. Mantieni la sessione viva ───────────────────────────────────────
      - name: Keep session alive
        run: |
          SESSION_DURATION="${{ github.event.inputs.session_duration }}"
          SLEEP_SECONDS=$(( SESSION_DURATION * 60 ))
          ELAPSED=0

          echo "Sessione attiva per $SESSION_DURATION minuti."

          while [ $ELAPSED -lt $SLEEP_SECONDS ]; do
            NEXT=$(( 300 < (SLEEP_SECONDS - ELAPSED) ? 300 : (SLEEP_SECONDS - ELAPSED) ))
            sleep $NEXT
            ELAPSED=$(( ELAPSED + NEXT ))
            REMAINING=$(( (SLEEP_SECONDS - ELAPSED) / 60 ))
            [ $REMAINING -gt 0 ] && echo "⏳ $REMAINING minuti rimanenti"

            # Watchdog
            pgrep -q x11vnc || nohup x11vnc \
              -display :99 -passwd "$VNC_PASS" \
              -forever -shared -rfbport 5900 \
              >> /tmp/x11vnc.log 2>&1 &

            pgrep -f "localhost.run" || nohup ssh \
              -i /tmp/tunnel_key \
              -o StrictHostKeyChecking=no \
              -o ServerAliveInterval=30 \
              -R 80:localhost:6080 \
              nokey@localhost.run >> /tmp/tunnel.log 2>&1 &
          done

          echo "✅ Sessione terminata."
