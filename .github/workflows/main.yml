name: Pure Native macOS Cloud

on:
  workflow_dispatch:
    inputs:
      session_duration:
        description: "Durata in minuti"
        required: false
        default: "30"
        type: string
      vnc_password:
        description: "Password d'accesso"
        required: false
        default: "SimoneLia2026"
        type: string

jobs:
  native-apple:
    runs-on: macos-latest
    timeout-minutes: 60

    steps:
      - name: Configure macOS User Password
        run: |
          sudo dscl . -passwd /Users/$USER "${{ github.event.inputs.vnc_password }}"
          echo "VNC_PASS=${{ github.event.inputs.vnc_password }}" >> "$GITHUB_ENV"

      - name: Start Apple Screen Sharing Server
        run: |
          sudo launchctl load -w /System/Library/LaunchDaemons/com.apple.screensharing.plist 2>/dev/null || true
          sudo /System/Library/CoreServices/RemoteManagement/ARDAgent.app/Contents/Resources/kickstart -activate -configure -access -on -clientopts -setvncpasswd -vncpasswd ${{ github.event.inputs.vnc_password }} -restart -agent -privs -all
          echo "Server grafici Apple sbloccati!"

      - name: Install Network Tools on macOS
        run: |
          brew install ngrok python
          pip3 install websockify

      - name: Connect Ngrok Tunnel
        run: |
          nohup websockify 6080 127.0.0.1:5900 </dev/null >/tmp/websockify.log 2>&1 &
          sleep 3
          ngrok config add-authtoken "cr_3FIY7tk5cyBNpguY03YAleOod2W"
          nohup ngrok http 6080 </dev/null >/tmp/ngrok.log 2>&1 &
          sleep 8
          URL=$(curl -s http://localhost:4040/api/tunnels | python3 -c "import sys, json; print(json.load(sys.stdin)['tunnels'][0]['public_url'])" 2>/dev/null || echo "ERROR")
          if [ "$URL" = "ERROR" ] || [ -z "$URL" ]; then
            echo "Errore tunnel"
            exit 1
          fi
          CLEAN_URL=$(echo "$URL" | sed 's/http:\/\//https:\/\//g')
          echo "TUNNEL_URL=$CLEAN_URL" >> "$GITHUB_ENV"

      - name: Setup Web Interface View
        run: |
          git clone --depth 1 https://github.com/novnc/noVNC.git /tmp/noVNC
          cp /tmp/noVNC/vnc.html /tmp/noVNC/index.html
          pkill -f websockify || true
          nohup websockify --web=/tmp/noVNC/ 6080 127.0.0.1:5900 </dev/null >/tmp/websockify.log 2>&1 &
          sleep 2

      - name: Display Connection Link
        run: |
          echo "IL TUO MAC OS NATIVO È IN LINEA!"
          echo "${TUNNEL_URL}/index.html?autoconnect=true&password=${VNC_PASS}"

      - name: Keep macOS alive
        run: |
          SESSION_DURATION="${{ github.event.inputs.session_duration }}"
          SLEEP_SECONDS=$(( SESSION_DURATION * 60 ))
          sleep $SLEEP_SECONDS
