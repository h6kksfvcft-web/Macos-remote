name: Ubuntu Desktop VM - 6 Hours

on:
  workflow_dispatch:

jobs:
  vm:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    
    steps:
      - name: Install QEMU & Tools
        run: |
          sudo apt update
          sudo apt install -y qemu-system-x86 qemu-utils \
            xvfb x11vnc tigervnc-standalone-server \
            wget curl git novnc websockify fluxbox

      - name: Download Ubuntu 24.04
        run: |
          # URL CORRETTI per Ubuntu 24.04
          wget -O ubuntu.iso "https://releases.ubuntu.com/24.04/ubuntu-24.04-desktop-amd64.iso"
          
          # Se fallisce, prova con 22.04
          if [ ! -f ubuntu.iso ] || [ $(stat -c%s ubuntu.iso) -lt 1000000000 ]; then
            echo "⬇️ Scaricando Ubuntu 22.04..."
            wget -O ubuntu.iso "https://releases.ubuntu.com/22.04/ubuntu-22.04.5-desktop-amd64.iso"
          fi
          
          ls -lh ubuntu.iso

      - name: Create virtual disk
        run: |
          qemu-img create -f qcow2 disk.qcow2 20G

      - name: Setup VNC
        run: |
          # Cleanup
          pkill Xvfb || true
          pkill vncserver || true
          
          # Setup VNC
          mkdir -p ~/.vnc
          echo "ubuntu123" | vncpasswd -f > ~/.vnc/passwd
          chmod 600 ~/.vnc/passwd
          
          # Avvia Xvfb
          Xvfb :99 -screen 0 1280x720x24 -ac &
          sleep 3
          
          export DISPLAY=:99
          
          # Avvia VNC
          vncserver :99 -geometry 1280x720 -depth 24 -localhost no
          sleep 3
          
          # Avvia noVNC
          git clone https://github.com/novnc/noVNC.git /tmp/novnc
          cd /tmp/novnc
          nohup ./utils/launch.sh --vnc localhost:5999 --listen 8080 &
          cd -
          
          echo "✅ VNC: localhost:5999"
          echo "🌐 Web: http://localhost:8080/vnc.html"

      - name: Start VM
        run: |
          export DISPLAY=:99
          
          # Avvia QEMU
          sudo qemu-system-x86_64 \
            -m 4096 \
            -cpu host \
            -enable-kvm \
            -smp cores=2 \
            -drive file=disk.qcow2,format=qcow2 \
            -cdrom ubuntu.iso \
            -boot order=d \
            -vnc :99 \
            -usb -device usb-tablet \
            -netdev user,id=net0,hostfwd=tcp::2222-:22 \
            -device e1000,netdev=net0 \
            -machine type=pc,accel=kvm &
          
          echo "========================================="
          echo "✅ VM AVVIATA!"
          echo "========================================="
          echo "🔗 VNC: localhost:5999"
          echo "🌐 Web VNC: http://localhost:8080/vnc.html"
          echo "⏱️  Durata: 6 ore"
          echo "========================================="
          
          sleep 21600

      - name: Keep alive
        run: |
          while true; do
            echo "🔄 VM attiva - $(date '+%Y-%m-%d %H:%M:%S')"
            sleep 300
          done
