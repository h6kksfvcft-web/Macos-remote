name: Pure Native macOS Cloud

on:
  workflow_dispatch:
    inputs:
      session_duration:
        description: "Durata in minuti"
        required: false
        default: "30"
        type: string
      vnc_password:
        description: "Password d'accesso"
        required: false
        default: "SimoneLia2026"
        type: string

jobs:
  native-apple:
    runs-on: macos-latest
    timeout-minutes: 60

    steps:
      # ─── 1. Installa gli strumenti di rete e macvnc tramite il canale dedicato ───
      - name: Install Network Tools and VNC Server
        run: |
          brew install ngrok
          # Aggiungiamo il repository specifico per scaricare macvnc funzionante su macOS core
          brew install MacGestalt/tap/macvnc
          pip3 install websockify --break-system-packages

      # ─── 2. Avvia il server VNC con la password scelta ───────────────────
      - name: Start macvnc Server
        run: |
          # Avviamo macvnc sulla porta standard 5900 usando la tua password
          nohup macvnc -password "${{ github.event.inputs.vnc_password }}" -port 5900 </dev/null >/tmp/macvnc.log 2>&1 &
          sleep 5

      # ─── 3. Connetti il Tunnel Ngrok ──────────────────────────────────────
      - name: Connect Ngrok Tunnel
        run: |
          # Websockify fa da ponte tra la porta web 6080 e il VNC 5900
          nohup websockify 6080 127.0.0.1:5900 </dev/null >/tmp/websockify.log 2>&1 &
          sleep 3
          
          ngrok config add-authtoken "3EoMAQM9GPofB8ve0Ur2rgD5K8t_2tqfrr56vyM8QNhUNiELX"
          nohup ngrok http 6080 </dev/null >/tmp/ngrok.log 2>&1 &
          sleep 12
          
          URL=$(curl -s http://localhost:4040/api/tunnels | python3 -c "import sys, json; print(json.load(sys.stdin)['tunnels'][0]['public_url'])" 2>/dev/null || echo "ERROR")
          
          if [ "$URL" = "ERROR" ] || [ -z "$URL" ]; then
            echo "❌ Errore tunnel Ngrok:"
            cat /tmp/ngrok.log
            exit 1
          fi
          
          CLEAN_URL=$(echo "$URL" | sed 's/http:\/\//https:\/\//g')
          echo "TUNNEL_URL=$CLEAN_URL" >> "$GITHUB_ENV"
          echo "VNC_PASS=${{ github.event.inputs.vnc_password }}" >> "$GITHUB_ENV"

      # ─── 4. Scarica e configura l'interfaccia web noVNC ───────────────────
      - name: Setup Web Interface View
        run: |
          git clone --depth 1 https://github.com/novnc/noVNC.git /tmp/noVNC
          cp /tmp/noVNC/vnc.html /tmp/noVNC/index.html
          pkill -f websockify || true
          nohup websockify --web=/tmp/noVNC/ 6080 127.0.0.1:5900 </dev/null >/tmp/websockify.log 2>&1 &
          sleep 2

      # ─── 5. Mostra il link di connessione finale ──────────────────────────
      - name: Display Connection Link
        run: |
          echo "╔══════════════════════════════════════════════════════════════╗"
          echo "║       🍏 IL TUO VERO MAC OS NATIVO È IN LINEA!               ║"
          echo "╠══════════════════════════════════════════════════════════════╣"
          echo "║                                                              ║"
          echo "║  👉 ${TUNNEL_URL}/index.html?autoconnect=true&password=${VNC_PASS}"
          echo "║                                                              ║"
          echo "╚══════════════════════════════════════════════════════════════╝"

      # ─── 6. Mantieni attiva la sessione ───────────────────────────────────
      - name: Keep macOS alive
        run: |
          SESSION_DURATION="${{ github.event.inputs.session_duration }}"
          SLEEP_SECONDS=$(( SESSION_DURATION * 60 ))
          sleep $SLEEP_SECONDS
