name: macOS Sequoia Remote Access (Pagekite)

on:
  workflow_dispatch:
    inputs:
      vnc_password:
        description: "Password per l'accesso VNC"
        required: false
        default: "SimoneLia2026!"
        type: string

jobs:
  macos-remote:
    runs-on: macos-15
    timeout-minutes: 360
    env:
      RUNNER_PASSWORD: ${{ github.event.inputs.vnc_password }}

    steps:
      # ---------------------------------------------------------------
      # STEP 1 - Checkout repository
      # ---------------------------------------------------------------
      - name: Checkout
        uses: actions/checkout@v4

      # ---------------------------------------------------------------
      # STEP 2 - Attivazione Screen Sharing (VNC) nativo di macOS
      # ---------------------------------------------------------------
      - name: Enable Native macOS VNC
        run: |
          set +x
          echo "[+] Spegnimento firewall di sistema..."
          sudo /usr/libexec/ApplicationFirewall/socketfilterfw --setglobalstate off || true
          sudo defaults write /Library/Preferences/com.apple.alf globalstate -int 0 || true
          
          echo "[+] Configurazione e avvio kickstart per Screen Sharing..."
          sudo /System/Library/CoreServices/RemoteManagement/ARDAgent.app/Contents/Resources/kickstart \
            -activate -configure -access -on \
            -clientopts -setvnclegacy -vnclegacy yes \
            -clientopts -setvncpw -vncpw "${RUNNER_PASSWORD}" \
            -configure -allowAccessFor -allUsers \
            -configure -access -on -privs -all \
            -restart -agent -menu
          
          echo "[+] Forzo preferenze di condivisione dello schermo..."
          sudo defaults write /Library/Preferences/com.apple.RemoteManagement.plist ARD_AllLocalUsers -bool true || true
          sudo defaults write /Library/Preferences/com.apple.VNCSettings.txt Password -string "${RUNNER_PASSWORD}" || true
          sudo launchctl bootstrap system /System/Library/LaunchDaemons/com.apple.screensharing.plist 2>/dev/null || true

      # ---------------------------------------------------------------
      # STEP 3 - Installazione e Avvio di Pagekite
      # ---------------------------------------------------------------
      - name: Install and Run Pagekite Tunnel
        run: |
          echo "[+] Download di Pagekite..."
          curl -s https://pagekite.net/pk/ | sudo bash
          
          echo "[+] Avvio del tunnel TCP sulla porta VNC (5900)..."
          # Creiamo un tunnel generico usando il backend pubblico di pagekite
          sudo nohup pagekite.py --clean 5900 raw:5900 > /tmp/pagekite.log 2>&1 &
          
          # Aspetta che il tunnel si sincronizzi con i server pubblici
          sleep 10

      # ---------------------------------------------------------------
      # STEP 4 - Estrazione dei dati di connessione dai log
      # ---------------------------------------------------------------
      - name: Display Connection Details
        run: |
          echo "================================================================"
          echo "  DATI PER IL COLLEGAMENTO REMOTO"
          echo "----------------------------------------------------------------"
          echo "  Controlla le righe qui sotto per trovare il tuo indirizzo temporaneo:"
          echo ""
          cat /tmp/pagekite.log | grep -E "is live|Flyback" || cat /tmp/pagekite.log
          echo ""
          echo "  Password VNC : ${RUNNER_PASSWORD}"
          echo "================================================================"

      # ---------------------------------------------------------------
      # STEP 5 - Mantenimento della sessione attiva (6 ore)
      # ---------------------------------------------------------------
      - name: Keep VM Alive
        run: |
          END=$((SECONDS+21600))
          while [ $SECONDS -lt $END ]; do
            REMAINING=$((END-SECONDS))
            echo "[heartbeat] Mac online. Tempo rimasto: ${REMAINING}s"
            sleep 600
          done
