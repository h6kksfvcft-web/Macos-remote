name: Interfaccia Grafica macOS 26 Tahoe

on: 
  workflow_dispatch: # Avvio manuale con un clic

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  gui-mac:
    runs-on: macos-26

    steps:
      - name: Checkout del codice
        uses: actions/checkout@v4.2.2

      # 1. Configura la password di accesso al desktop grafico nativo di macOS
      - name: Configura Password di Accesso
        run: |
          DYNAMIC_PASS=$(openssl rand -base64 9 | tr -dc 'a-zA-Z0-9')
          echo "=================================================="
          echo "LA TUA PASSWORD DI ACCESSO GRAFICO È: $DYNAMIC_PASS"
          echo "=================================================="
          
          # Salva la chiave d'accesso per il servizio VNC Apple
          mkdir -p ~/.vnc
          sudo defaults write /Library/Preferences/com.apple.VNCSettings.txt Password -string "$DYNAMIC_PASS"
          
          # Attiva la condivisione dello schermo ufficiale integrata in macOS Tahoe
          sudo launchctl load -w /System/Library/LaunchDaemons/com.apple.screensharing.plist 2>/dev/null || true

      # 2. Configura ed esegue il tunnel tramite Pagekite (Senza obbligo di account)
      - name: Avvia il Tunnel per la GUI
        run: |
          echo "Configurazione del tunnel grafico con Pagekite..."
          
          # Scarica lo script ufficiale standalone di pagekite
          curl -s https://pagekite.net -o pagekite.py
          chmod +x pagekite.py
          
          # Genera un nome casuale e univoco per il tuo link di rete
          RANDOM_NAME="mac-gui-$(openssl rand -hex 4)"
          
          echo "=================================================="
          echo "DATI PER IL TUO CLIENT VNC (Es: RealVNC o Condivisione Schermo):"
          echo "Indirizzo a cui connettersi: ${RANDOM_NAME}.pagekite.me"
          echo "=================================================="
          
          # Avvia il tunnel sulla porta nativa dello schermo del Mac (5900)
          # Accetta automaticamente i termini d'uso del servizio gratuito temporaneo
          python3 pagekite.py --clean 5900 ${RANDOM_NAME}.pagekite.me --defaults > /dev/null &
          sleep 8
          
          # Mantiene attivo il workflow per permetterti l'utilizzo visivo
          while true; do
            sleep 10
          done
