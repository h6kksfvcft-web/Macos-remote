Name: macOS Desktop (Self-Hosted)

on:
  workflow_dispatch:
    inputs:
      session_duration:
        description: "Durata sessione in minuti (max 360)"
        required: false
        default: "60"
        type: string
      vnc_password:
        description: "Password VNC (lascia vuoto per auto-generata)"
        required: false
        default: ""
        type: string

jobs:
  remote-desktop:
    runs-on: self-hosted  # Gira sul tuo Mac fisico
    timeout-minutes: 360

    steps:
      # ─── 1. Installa dipendenze ──────────────────────────────────────────────
      - name: Install dependencies
        run: |
          # Usiamo python3 e pip per installare moduli utili se necessari, e scarichiamo noVNC
          brew install git python3 2>/dev/null || true
          
          # Scarica noVNC e websockify
          rm -rf /tmp/noVNC
          git clone --depth 1 https://github.com/novnc/noVNC.git /tmp/noVNC 2>/dev/null || true
          git clone --depth 1 https://github.com/novnc/websockify /tmp/noVNC/utils/websockify 2>/dev/null || true
          
          # Installiamo un server VNC leggero per macOS se x11vnc non è adatto
          # In alternativa, ci assicuriamo che python gestisca i pacchetti necessari
          echo "✅ Dipendenze pronte"

      # ─── 2. Generazione Password e Controllo VNC macOS ──────────────────────
      - name: Configure VNC Password
        run: |
          if [ -n "${{ github.event.inputs.vnc_password }}" ]; then
            VNC_PASS="${{ github.event.inputs.vnc_password }}"
          else
            VNC_PASS="$(openssl rand -hex 4)"
          fi
          echo "VNC_PASS=$VNC_PASS" >> "$GITHUB_ENV"
          
          # Nota: Per usare la condivisione schermo nativa di macOS sulla porta 5900:
          # sudo /System/Library/CoreServices/RemoteManagement/ARDAgent.app/Contents/Resources/kickstart -activate -configure -access -on -restart -agent -privs -all
          echo "✅ Password configurata"

      # ─── 3. Avvia noVNC Proxy ───────────────────────────────────────────────
      # Collega noVNC alla porta del server VNC locale di macOS (solitamente 5900)
      - name: Start noVNC
        run: |
          pkill -f novnc_proxy 2>/dev/null || true
          sleep 1

          # Mappa la porta 6080 verso la porta VNC standard di macOS (5900)
          nohup python3 /tmp/noVNC/utils/novnc_proxy \
            --vnc localhost:5900 \
            --listen 6080 \
            > /tmp/novnc.log 2>&1 &

          sleep 3
          echo "✅ noVNC attivo sulla porta 6080"

      # ─── 4. Tunnel localhost.run ─────────────────────────────────────────────
      - name: Start tunnel
        run: |
          mkdir -p ~/.ssh
          ssh-keygen -t ed25519 -f /tmp/tunnel_key -N "" -q 2>/dev/null || true

          pkill -f "localhost.run" 2>/dev/null || true
          sleep 1

          nohup ssh \
            -i /tmp/tunnel_key \
            -o StrictHostKeyChecking=no \
            -o ServerAliveInterval=30 \
            -o ServerAliveCountMax=10 \
            -R 80:localhost:6080 \
            nokey@localhost.run \
            > /tmp/tunnel.log 2>&1 &

          echo "Attendo URL tunnel..."
          for i in $(seq 1 30); do
            sleep 2
            URL=$(grep -oE 'https://[a-zA-Z0-9.-]+\.lhr\.life' /tmp/tunnel.log | head -1)
            if [ -n "$URL" ]; then
              echo "TUNNEL_URL=$URL" >> "$GITHUB_ENV"
              echo "✅ Tunnel attivo!"
              break
            fi
            echo -n "."
          done
          echo ""
          if [ -z "$URL" ]; then
            cat /tmp/tunnel.log
            exit 1
          fi

      # ─── 5. Mostra credenziali (Calcolo tempo compatibile) ──────────────────
      - name: Display connection info
        run: |
          SESSION_DURATION="${{ github.event.inputs.session_duration }}"
          # Calcolo del tempo cross-platform usando Python
          END_TIME=$(python3 -c "import datetime; print((datetime.datetime.utcnow() + datetime.timedelta(minutes=$SESSION_DURATION)).strftime('%H:%M UTC'))")

          echo ""
          echo "╔══════════════════════════════════════════════════════════════╗"
          echo "║       🖥️  IL TUO MAC È ACCESSIBILE DAL BROWSER!              ║"
          echo "╠══════════════════════════════════════════════════════════════╣"
          echo "║                                                              ║"
          echo "║  👉 ${TUNNEL_URL}/vnc.html?autoconnect=true"
          echo "║                                                              ║"
          printf "║  🔑 Password VNC :  %-41s║\n" "$VNC_PASS"
          printf "║  ⏱️  Attivo fino  :  %-41s║\n" "$END_TIME"
          echo "╚══════════════════════════════════════════════════════════════╝"
          echo ""
          echo "::add-mask::$VNC_PASS"

      # ─── 6. Mantieni la sessione viva e monitora il tunnel ──────────────────
      - name: Keep session alive
        run: |
          SESSION_DURATION="${{ github.event.inputs.session_duration }}"
          SLEEP_SECONDS=$(( SESSION_DURATION * 60 ))
          ELAPSED=0

          echo "Sessione attiva per $SESSION_DURATION minuti."
          echo "Per chiudere prima: annulla il workflow da GitHub Actions."

          while [ $ELAPSED -lt $SLEEP_SECONDS ]; do
            NEXT=$(( 300 < (SLEEP_SECONDS - ELAPSED) ? 300 : (SLEEP_SECONDS - ELAPSED) ))
            sleep $NEXT
            ELAPSED=$(( ELAPSED + NEXT ))
            REMAINING=$(( (SLEEP_SECONDS - ELAPSED) / 60 ))
            [ $REMAINING -gt 0 ] && echo "⏳ $REMAINING minuti rimanenti"

            # Ripristina il tunnel se cade
            pgrep -f "localhost.run" >/dev/null || nohup ssh \
              -i /tmp/tunnel_key \
              -o StrictHostKeyChecking=no \
              -o ServerAliveInterval=30 \
              -R 80:localhost:6080 \
              nokey@localhost.run >> /tmp/tunnel.log 2>&1 &
          done

          echo "✅ Sessione terminata."
