name: GUI macOS 26 Infallibile per iPhone

on: 
  workflow_dispatch: # Avvio manuale con un clic da GitHub

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  gui-mac:
    runs-on: macos-26

    steps:
      - name: Checkout del codice
        uses: actions/checkout@v4.2.2

      # 1. Attiva lo schermo del Mac e imposta la password (Nativo Apple)
      - name: Configura Password di Accesso
        run: |
          DYNAMIC_PASS=$(openssl rand -base64 9 | tr -dc 'a-zA-Z0-9')
          echo "=================================================="
          echo "LA TUA PASSWORD DI ACCESSO GRAFICO È: $DYNAMIC_PASS"
          echo "=================================================="
          
          # Imposta la chiave d'accesso per il servizio Condivisione Schermo Apple
          sudo defaults write /Library/Preferences/com.apple.VNCSettings.txt Password -string "$DYNAMIC_PASS"
          
          # Cambia la password dell'utente 'runner' a livello di sistema per il tunnel SSH
          echo -e "PasswordMac123\nPasswordMac123" | sudo passwd runner
          
          # Forza l'attivazione del server grafico del Mac
          sudo launchctl load -w /System/Library/LaunchDaemons/com.apple.screensharing.plist 2>/dev/null || true

      # 2. Configura un'estensione di rete pubblica ufficiale temporanea
      - name: Attiva Connessione Diretta
        run: |
          echo "Inizializzazione del tunnel di sistema..."
          
          # Crea un tunnel SSH invertito usando il server universale di test integrato nel terminale del Mac
          ssh -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -R 80:localhost:5900 localhost.run > /tmp/tunnel.txt 2>&1 &
          sleep 10
          
          echo "=================================================="
          echo "DATI DA INSERIRE SUL TUO IPHONE:"
          # Estrae l'indirizzo internet univoco generato per te
          grep -o '[a-z0-9]*\.lhrtunnel\.link' /tmp/tunnel.txt || echo "Link in generazione, controlla i log completi sotto..."
          echo "=================================================="
          
          # Mostra i log di rete completi a schermo per darti l'indirizzo in chiaro
          cat /tmp/tunnel.txt
          echo "=================================================="
          
          # Mantiene la macchina virtuale online senza scadenze finché non la chiudi tu
          while true; do
            sleep 10
          done
