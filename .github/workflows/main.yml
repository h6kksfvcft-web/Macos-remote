name: macOS Sequoia Desktop con AnyDesk

on:
  workflow_dispatch:

jobs:
  macos-anydesk:
    runs-on: macos-15
    timeout-minutes: 360

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Imposta VNC e abilita accesso remoto
        run: |
          # Abilita Remote Management
          sudo /System/Library/CoreServices/RemoteManagement/ARDAgent.app/Contents/Resources/kickstart \
            -activate -configure -access -on -restart -agent -menu
          
          # Abilita accesso per tutti gli utenti
          sudo /System/Library/CoreServices/RemoteManagement/ARDAgent.app/Contents/Resources/kickstart \
            -configure -allowAccessFor -allUsers -privs -all
          
          echo "✅ Remote Management attivato"

      - name: Scarica e installa AnyDesk
        run: |
          # Scarica AnyDesk
          curl -L -o AnyDesk.dmg "https://download.anydesk.com/mac/AnyDesk.dmg"
          
          # Monta e installa
          sudo hdiutil attach AnyDesk.dmg -nobrowse
          sudo cp -R /Volumes/AnyDesk/AnyDesk.app /Applications/
          sudo hdiutil detach /Volumes/AnyDesk
          
          # Rimuovi quarantine
          sudo xattr -d com.apple.quarantine /Applications/AnyDesk.app 2>/dev/null || true

      - name: Avvia AnyDesk
        run: |
          # Avvia AnyDesk
          open /Applications/AnyDesk.app &
          
          # Aspetta l'avvio
          sleep 15
          
          # Ottieni l'ID AnyDesk
          ANYDESK_ID=$(defaults read ~/Library/Preferences/com.philandro.anydesk.plist "AdDisplayID" 2>/dev/null || echo "N/A")
          
          echo "========================================="
          echo "✅ macOS Sequoia pronto!"
          echo "========================================="
          echo "🔑 AnyDesk ID: $ANYDESK_ID"
          echo "🔐 Password: usa il link di AnyDesk"
          echo "⏱️  Durata: 6 ore"
          echo "========================================="
          echo ""
          echo "📌 Se l'ID non appare, controlla i log di AnyDesk:"
          echo "   log stream --process AnyDesk"
          
          # Mantieni attivo
          sleep 21600

      - name: Keep alive
        run: |
          while true; do
            echo "🔄 Desktop attivo - $(date '+%Y-%m-%d %H:%M:%S')"
            echo "📊 Processi:"
            ps aux | grep -E "AnyDesk|ARDAgent" | grep -v grep | wc -l
            echo "📊 Connessioni:"
            netstat -an | grep 5900 | wc -l
            sleep 300
          done
