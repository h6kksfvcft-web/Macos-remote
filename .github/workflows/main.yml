name: Interfaccia Grafica macOS 26 Funzionante

on: 
  workflow_dispatch: # Avvio manuale con un clic

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  gui-mac:
    runs-on: macos-26

    steps:
      - name: Checkout del codice
        uses: actions/checkout@v4.2.2

      # 1. Configura la password del server VNC Apple nativo
      - name: Configura Password di Accesso
        run: |
          DYNAMIC_PASS=$(openssl rand -base64 9 | tr -dc 'a-zA-Z0-9')
          echo "=================================================="
          echo "LA TUA PASSWORD DI ACCESSO GRAFICO È: $DYNAMIC_PASS"
          echo "=================================================="
          
          # Imposta la chiave d'accesso per il servizio VNC ufficiale Apple
          sudo defaults write /Library/Preferences/com.apple.VNCSettings.txt Password -string "$DYNAMIC_PASS"
          
          # Attiva la Condivisione Schermo ufficiale nativa di macOS Tahoe
          sudo launchctl load -w /System/Library/LaunchDaemons/com.apple.screensharing.plist 2>/dev/null || true

      # 2. Installa cloudflared tramite Homebrew per generare il link pubblico senza account
      - name: Avvia il Tunnel Cloudflare per la GUI
        run: |
          echo "Installazione di Cloudflare Tunnel in corso..."
          export HOMEBREW_NO_ENV_HINTS=1
          brew install cloudflared --quiet
          
          echo "Avvio del tunnel grafico sulla porta VNC (5900)..."
          # Avvia il tunnel sulla porta ufficiale dello schermo del Mac e salva il link nei log
          cloudflared tunnel --url tcp://localhost:5900 > /tmp/cf.log 2>&1 &
          sleep 8
          
          echo "=================================================="
          echo "DATI PER IL TUO CLIENT VNC (Es: RealVNC o Condivisione Schermo):"
          # Estrae l'indirizzo dinamico assegnato da Cloudflare (.trycloudflare.com)
          grep -o 'trycloudflare.com:[0-9]*' /tmp/cf.log || echo "Generazione link in corso, controlla sotto..."
          echo "=================================================="
          
          # Mostra l'intero output di cloudflared per sicurezza se il grep non trova subito la stringa
          cat /tmp/cf.log | grep -i "inf"
          echo "=================================================="
          
          # Ciclo infinito per mantenere stabile il Mac virtuale
          while true; do
            sleep 10
          done
