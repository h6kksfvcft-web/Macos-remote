name: GUI macOS 26 Senza Secret

on: 
  workflow_dispatch: # Avvio manuale con un clic

jobs:
  interfaccia-grafica:
    runs-on: macos-26

    steps:
      - name: Checkout del codice
        uses: actions/checkout@v4

      # Configura lo schermo usando i comandi nativi di macOS (Evita Errore 127)
      - name: Configura Schermo con Password Casuale
        run: |
          # 1. Genera una password casuale dinamica e sicura
          DYNAMIC_PASS=$(openssl rand -base64 9 | tr -dc 'a-zA-Z0-9')
          echo "=================================================="
          echo "LA TUA PASSWORD DI ACCESSO È: $DYNAMIC_PASS"
          echo "=================================================="
          
          # 2. Cambia la password dell'utente corrente ("runner") in macOS
          echo -e "$DYNAMIC_PASS\n$DYNAMIC_PASS" | sudo passwd runner
          
          # 3. Attiva il server della condivisione schermo nativo di Apple
          sudo /System/Library/CoreServices/RemoteManagement/ARDAgent.app/Contents/Resources/kickstart \
            -activate -configure -access -on \
            -grantprivs -all \
            -restart -agent

      # Avvia il tunnel tmate per darti i link di accesso alla macchina
      - name: Avvia il Tunnel per la GUI
        uses: mxschmitt/action-tmate@v3
