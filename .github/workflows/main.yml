name: Interfaccia Grafica macOS 26 Tahoe

on: 
  workflow_dispatch: # Avvio manuale con un clic

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  gui-mac:
    runs-on: macos-26

    steps:
      - name: Checkout del codice
        uses: actions/checkout@v4.2.2

      # 1. Configura la password di accesso al desktop grafico
      - name: Configura Password di Accesso
        run: |
          DYNAMIC_PASS=$(openssl rand -base64 9 | tr -dc 'a-zA-Z0-9')
          echo "=================================================="
          echo "LA TUA PASSWORD DI ACCESSO GRAFICO È: $DYNAMIC_PASS"
          echo "=================================================="
          
          # Cambia la password del pannello VNC nativo di macOS
          mkdir -p ~/.vnc
          sudo defaults write /Library/Preferences/com.apple.VNCSettings.txt Password -string "$DYNAMIC_PASS"
          
          # Attiva la condivisione dello schermo ufficiale integrata in Apple Tahoe
          sudo launchctl load -w /System/Library/LaunchDaemons/com.apple.screensharing.plist 2>/dev/null || true

      # 2. Configura il tunnel con Ngrok (Estremamente stabile per la trasmissione video)
      - name: Avvia il Tunnel per la GUI
        run: |
          echo "Configurazione del server video in corso..."
          # Scarica il binario ufficiale di Ngrok per macOS Apple Silicon (ARM64)
          curl -sL https://equinox.io -o ngrok.zip
          unzip -q ngrok.zip
          
          # Avvia il tunnel sulla porta TCP 5900 (la porta nativa dello schermo del Mac)
          ./ngrok tcp 5900 --log=stdout > /dev/null &
          sleep 5
          
          echo "=================================================="
          echo "DATI PER IL TUO CLIENT VNC (Es: RealVNC o Condivisione Schermo):"
          # Estrae l'indirizzo TCP generato dal tunnel
          curl -s http://localhost:4040/api/tunnels | grep -o 'tcp://[^"]*' || echo "Errore di rete, riprova..."
          echo "=================================================="
          
          # Mantiene il server online per non far chiudere GitHub Actions
          while true; do
            sleep 10
          done
