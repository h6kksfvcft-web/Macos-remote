name: macOS Desktop - Cloudflare

on: workflow_dispatch

jobs:
  desktop:
    runs-on: macos-15
    timeout-minutes: 360

    steps:
      - name: Abilita Remote Management
        run: |
          sudo /System/Library/CoreServices/RemoteManagement/ARDAgent.app/Contents/Resources/kickstart \
            -activate -configure -access -on -restart -agent -menu
          sudo /System/Library/CoreServices/RemoteManagement/ARDAgent.app/Contents/Resources/kickstart \
            -configure -allowAccessFor -allUsers -privs -all
          echo "✅ Remote Management attivato"

      - name: Imposta password VNC
        run: |
          PASSWORD="password123"
          sudo defaults write /Library/Preferences/com.apple.RemoteManagement.plist VNCEnabled -bool TRUE
          sudo defaults write /Library/Preferences/com.apple.RemoteManagement.plist ScreenSharingRequiresPassword -bool TRUE
          echo "$PASSWORD" > /tmp/vncpass
          sudo mv /tmp/vncpass /Library/Preferences/com.apple.RemoteManagement.password
          sudo chmod 600 /Library/Preferences/com.apple.RemoteManagement.password
          echo "✅ Password impostata: $PASSWORD"

      - name: Installa Cloudflare Tunnel
        run: |
          curl -L -o cloudflared "https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-darwin-arm64"
          chmod +x cloudflared
          echo "✅ Cloudflare installato"

      - name: Avvia tunnel
        run: |
          # Avvia il tunnel
          ./cloudflared tunnel --url localhost:5900 &
          
          sleep 10
          
          echo "========================================="
          echo "✅ MACOS PRONTO!"
          echo "========================================="
          echo "🌐 TUNNEL ATTIVO"
          echo "🔐 Password: password123"
          echo "⏱️  6 ore"
          echo "========================================="
          echo ""
          echo "📌 PER TROVARE L'URL:"
          echo "   Cerca nei log sopra 'https://'"
          echo "   o 'trycloudflare.com'"
          echo ""
          echo "📌 PER CONNETTERSI:"
          echo "   1. Vai all'URL trovato nei log"
          echo "   2. Usa password: password123"
          
          sleep 21600

      - name: Keep alive
        run: |
          while true; do
            echo "🔄 Attivo - $(date '+%Y-%m-%d %H:%M:%S')"
            sleep 300
          done
