name: macOS Remote Desktop (RustDesk)

on:
  workflow_dispatch:
    inputs:
      session_duration:
        description: "Durata sessione in minuti (max 360)"
        required: false
        default: "60"
        type: string
      rustdesk_password:
        description: "Password RustDesk (lascia vuoto per auto-generata)"
        required: false
        default: ""
        type: string

jobs:
  remote-desktop:
    runs-on: macos-latest
    timeout-minutes: 360

    steps:
      # ─── 1. Installa RustDesk ────────────────────────────────────────────────
      - name: Install RustDesk
        run: |
          # Scarica l'ultima release di RustDesk per macOS
          LATEST=$(curl -s https://api.github.com/repos/rustdesk/rustdesk/releases/latest \
            | grep "browser_download_url" \
            | grep "macos" \
            | grep -v "arm64" \
            | grep "\.dmg" \
            | head -1 \
            | cut -d '"' -f 4)

          echo "Download da: $LATEST"
          curl -L "$LATEST" -o /tmp/rustdesk.dmg

          # Monta e installa il DMG
          hdiutil attach /tmp/rustdesk.dmg -nobrowse -quiet
          MOUNT=$(ls /Volumes | grep -i rustdesk | head -1)
          echo "Volume montato: /Volumes/$MOUNT"

          cp -R "/Volumes/$MOUNT/RustDesk.app" /Applications/
          hdiutil detach "/Volumes/$MOUNT" -quiet

          echo "✅ RustDesk installato"
          ls /Applications/RustDesk.app/Contents/MacOS/

      # ─── 2. Avvia RustDesk headless ─────────────────────────────────────────
      - name: Start RustDesk
        run: |
          RUSTDESK="/Applications/RustDesk.app/Contents/MacOS/rustdesk"

          # Genera o usa password fornita
          if [ -n "${{ github.event.inputs.rustdesk_password }}" ]; then
            REMOTE_PASS="${{ github.event.inputs.rustdesk_password }}"
          else
            REMOTE_PASS="$(openssl rand -base64 12 | tr -dc 'A-Za-z0-9' | head -c 12)"
          fi

          echo "REMOTE_PASS=$REMOTE_PASS" >> "$GITHUB_ENV"
          echo "RUSTDESK_BIN=$RUSTDESK" >> "$GITHUB_ENV"

          # Imposta password e avvia in modalità servizio headless
          "$RUSTDESK" --password "$REMOTE_PASS" &
          sleep 5

          # Avvia il server headless
          nohup "$RUSTDESK" --server > /tmp/rustdesk.log 2>&1 &
          sleep 10

          echo "=== Log RustDesk ==="
          cat /tmp/rustdesk.log || true

      # ─── 3. Recupera l'ID RustDesk ──────────────────────────────────────────
      - name: Get RustDesk ID
        run: |
          # RustDesk supporta --get-id nativamente
          RUSTDESK_ID=$("$RUSTDESK_BIN" --get-id 2>/dev/null | tr -d '[:space:]')

          # Fallback: leggi dai log
          if [ -z "$RUSTDESK_ID" ]; then
            RUSTDESK_ID=$(grep -oE '[0-9]{9,12}' /tmp/rustdesk.log 2>/dev/null | head -1)
          fi

          # Fallback: file di config
          if [ -z "$RUSTDESK_ID" ]; then
            CONF="$HOME/Library/Preferences/com.carriez.rustdesk/RustDesk2.toml"
            RUSTDESK_ID=$(grep "^id" "$CONF" 2>/dev/null | awk -F'"' '{print $2}')
          fi

          echo "RUSTDESK_ID=${RUSTDESK_ID:-NON_TROVATO}" >> "$GITHUB_ENV"
          echo "✅ RustDesk ID: ${RUSTDESK_ID:-non trovato}"

      # ─── 4. Mostra credenziali ──────────────────────────────────────────────
      - name: Display connection info
        run: |
          SESSION_DURATION="${{ github.event.inputs.session_duration }}"
          END_TIME=$(date -v+"${SESSION_DURATION}M" "+%H:%M UTC")

          echo ""
          echo "╔══════════════════════════════════════════════════════════════╗"
          echo "║       🖥️  RUSTDESK – ACCESSO REMOTO macOS PRONTO             ║"
          echo "╠══════════════════════════════════════════════════════════════╣"
          printf "║  📍 ID RustDesk  :  %-41s║\n" "$RUSTDESK_ID"
          printf "║  🔑 Password     :  %-41s║\n" "$REMOTE_PASS"
          printf "║  ⏱️  Attivo fino  :  %-41s║\n" "$END_TIME"
          echo "╠══════════════════════════════════════════════════════════════╣"
          echo "║  Come connettersi:                                           ║"
          echo "║  1. Apri RustDesk sul tuo PC / Mac                          ║"
          echo "║  2. Digita l'ID e premi Invio                                ║"
          echo "║  3. Inserisci la password quando richiesta                   ║"
          echo "║  📥 Download: https://rustdesk.com/download                  ║"
          echo "╚══════════════════════════════════════════════════════════════╝"
          echo ""

          # Maschera la password dai log successivi
          echo "::add-mask::$REMOTE_PASS"

      # ─── 5. Mantieni la sessione viva ───────────────────────────────────────
      - name: Keep session alive
        run: |
          SESSION_DURATION="${{ github.event.inputs.session_duration }}"
          SLEEP_SECONDS=$(( SESSION_DURATION * 60 ))
          ELAPSED=0

          echo "Sessione attiva per $SESSION_DURATION minuti."
          echo "Per chiudere prima: annulla il workflow da GitHub Actions."

          while [ $ELAPSED -lt $SLEEP_SECONDS ]; do
            NEXT=$(( 300 < (SLEEP_SECONDS - ELAPSED) ? 300 : (SLEEP_SECONDS - ELAPSED) ))
            sleep $NEXT
            ELAPSED=$(( ELAPSED + NEXT ))
            REMAINING=$(( (SLEEP_SECONDS - ELAPSED) / 60 ))
            [ $REMAINING -gt 0 ] && echo "⏳ $REMAINING minuti rimanenti"

            # Riavvia RustDesk se il processo è morto
            pgrep -q rustdesk || nohup "$RUSTDESK_BIN" --server >> /tmp/rustdesk.log 2>&1 &
          done

          echo "✅ Sessione terminata."
