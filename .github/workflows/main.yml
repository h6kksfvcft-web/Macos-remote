name: macOS Remote Access (tmate)

on:
  workflow_dispatch:
    inputs:
      session_duration:
        description: "Durata sessione in minuti (max 360)"
        required: false
        default: "60"
        type: string

jobs:
  remote-access:
    runs-on: macos-latest
    timeout-minutes: 360

    steps:
      - name: Start tmate session
        uses: mxschmitt/action-tmate@v3
        with:
          limit-access-to-actor: true
        timeout-minutes: ${{ fromJSON(github.event.inputs.session_duration) }}
