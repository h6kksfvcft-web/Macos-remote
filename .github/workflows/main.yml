name: macOS Sequoia - TeamViewer

on: workflow_dispatch

jobs:
  teamviewer:
    runs-on: macos-15
    timeout-minutes: 360

    steps:
      - name: Abilita Remote Management
        run: |
          sudo /System/Library/CoreServices/RemoteManagement/ARDAgent.app/Contents/Resources/kickstart \
            -activate -configure -access -on -restart -agent -menu
          sudo /System/Library/CoreServices/RemoteManagement/ARDAgent.app/Contents/Resources/kickstart \
            -configure -allowAccessFor -allUsers -privs -all
          echo "✅ Remote Management attivato"

      - name: Installa TeamViewer
        run: |
          curl -L -o TeamViewer.dmg "https://download.teamviewer.com/download/TeamViewer.dmg"
          sudo hdiutil attach TeamViewer.dmg -nobrowse
          sudo cp -R /Volumes/TeamViewer/TeamViewer.app /Applications/
          sudo hdiutil detach /Volumes/TeamViewer
          sudo xattr -d com.apple.quarantine /Applications/TeamViewer.app 2>/dev/null || true
          echo "✅ TeamViewer installato"

      - name: Avvia TeamViewer
        run: |
          # Avvia TeamViewer
          open /Applications/TeamViewer.app &
          
          # Aspetta l'avvio
          sleep 30
          
          # Leggi ID
          TV_ID=$(defaults read ~/Library/Preferences/com.teamviewer.teamviewer.plist "ClientID" 2>/dev/null || echo "")
          
          if [ -z "$TV_ID" ]; then
            TV_ID=$(grep -o 'ClientID=[0-9]*' ~/Library/Application\ Support/TeamViewer/Config/TeamViewer.conf 2>/dev/null | cut -d'=' -f2)
          fi
          
          if [ -z "$TV_ID" ]; then
            TV_ID="CONTROLLA L'APP"
          fi
          
          echo "========================================="
          echo "✅ MACOS PRONTO!"
          echo "========================================="
          echo "🔑 TEAMVIEWER ID: $TV_ID"
          echo "🔐 PASSWORD: password123"
          echo "⏱️  6 ORE"
          echo "========================================="
          echo ""
          echo "📌 CONNETTITI:"
          echo "   1. Apri TeamViewer sul tuo PC"
          echo "   2. Inserisci ID: $TV_ID"
          echo "   3. Password: password123"
          
          sleep 21600
