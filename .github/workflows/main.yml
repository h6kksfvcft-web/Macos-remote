name: Real macOS Cloud (Instant Docker)

on:
  workflow_dispatch:
    inputs:
      session_duration:
        description: "Durata sessione in minuti (max 360)"
        required: false
        default: "60"
        type: string
      vnc_password:
        description: "Password VNC (lascia vuoto per auto-generata)"
        required: false
        default: ""
        type: string

jobs:
  macos-desktop:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      # ─── 1. Pulisci l'ambiente per avere massima RAM ────────────────────────
      - name: Maximize Build Space and RAM
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc
          sudo docker system prune -a -f

      # ─── 2. Avvia il vero macOS tramite container Docker ottimizzato ─────────
      - name: Run macOS Container
        run: |
          if [ -n "${{ github.event.inputs.vnc_password }}" ]; then
            VNC_PASS="${{ github.event.inputs.vnc_password }}"
          else
            VNC_PASS="$(openssl rand -hex 4)"
          fi
          echo "VNC_PASS=$VNC_PASS" >> "$GITHUB_ENV"

          # Avviamo l'immagine Docker del vero macOS (Catalina), configurando
          # la RAM, i core e abilitando l'interfaccia noVNC interna sulla porta 8006
          sudo docker run -d --name macos \
            --device /dev/kvm \
            -p 6080:8006 \
            -e RAM="6G" \
            -e CORES="4" \
            -e VERSION="10.15" \
            -e VNC_PASSWORD="$VNC_PASS" \
            --vga qxl \
            dockurr/macos

          echo "Attendo l'inizializzazione del container..."
          sleep 15

      # ─── 3. Avvia il Tunnel Cloudflare sulla porta corretta ──────────────────
      - name: Start Cloudflare Tunnel
        run: |
          curl -L --output /tmp/cloudflared https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64
          chmod +x /tmp/cloudflared
          
          nohup /tmp/cloudflared tunnel --url http://127.0.0.1:6080 </dev/null >/tmp/cloudflare.log 2>&1 &
          
          echo "Attendo URL pubblico da Cloudflare..."
          for i in $(seq 1 30); do
            sleep 3
            URL=$(grep -oE 'https://[a-zA-Z0-9.-]+\.trycloudflare\.com' /tmp/cloudflare.log | head -1)
            if [ -n "$URL" ]; then
              echo "TUNNEL_URL=$URL" >> "$GITHUB_ENV"
              echo "✅ Tunnel Cloudflare collegato a macOS!"
              break
            fi
          done
          if [ -z "$URL" ]; then
            cat /tmp/cloudflare.log
            exit 1
          fi

      # ─── 4. Mostra il link per connetterti ──────────────────────────────────
      - name: Display connection info
        run: |
          SESSION_DURATION="${{ github.event.inputs.session_duration }}"
          END_TIME=$(python3 -c "import datetime; print((datetime.datetime.utcnow() + datetime.timedelta(minutes=$SESSION_DURATION)).strftime('%H:%M UTC'))")

          echo ""
          echo "╔══════════════════════════════════════════════════════════════╗"
          echo "║       🍏 IL TUO VERO MAC OS CLOUD È PRONTO!                  ║"
          echo "╠══════════════════════════════════════════════════════════════╣"
          echo "║                                                              ║"
          echo "║  👉 ${TUNNEL_URL}/?vncpassword=${VNC_PASS}"
          echo "║                                                              ║"
          printf "║  🔑 Password VNC :  %-41s║\n" "$VNC_PASS"
          printf "║  ⏱️  Attivo fino  :  %-41s║\n" "$END_TIME"
          echo "╚══════════════════════════════════════════════════════════════╝"
          echo ""

      # ─── 5. Mantieni viva la sessione ───────────────────────────────────────
      - name: Keep session alive
        run: |
          SESSION_DURATION="${{ github.event.inputs.session_duration }}"
          SLEEP_SECONDS=$(( SESSION_DURATION * 60 ))
          sleep $SLEEP_SECONDS
