name: Unbrickable Linux Desktop Cloud

on:
  workflow_dispatch:
    inputs:
      session_duration:
        description: "Durata sessione in minuti (max 360)"
        required: false
        default: "60"
        type: string
      vnc_password:
        description: "Password VNC (lascia vuoto per auto-generata)"
        required: false
        default: ""
        type: string

jobs:
  remote-desktop:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      # ─── 1. Installa l'ambiente desktop ──────────────────────────────────────
      - name: Install Desktop Environment and noVNC
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends xfce4 xfce4-session xvfb x11vnc python3 git curl dbus-x11 xinit
          
          rm -rf /tmp/noVNC
          git clone --depth 1 https://github.com/novnc/noVNC.git /tmp/noVNC
          git clone --depth 1 https://github.com/novnc/websockify /tmp/noVNC/utils/websockify

      # ─── 2. Avvia lo schermo virtuale e il Desktop ──────────────────────────
      - name: Start Virtual Screen and XFCE
        run: |
          Xvfb :1 -screen 0 1280x720x24 +extension GLX +render -noreset &
          sleep 3
          export DISPLAY=:1
          dbus-launch --exit-with-session startxfce4 &
          sleep 5

      # ─── 3. Avvia il Server VNC con Password ────────────────────────────────
      - name: Start VNC Server
        run: |
          if [ -n "${{ github.event.inputs.vnc_password }}" ]; then
            VNC_PASS="${{ github.event.inputs.vnc_password }}"
          else
            VNC_PASS="$(openssl rand -hex 4)"
          fi
          echo "VNC_PASS=$VNC_PASS" >> "$GITHUB_ENV"

          nohup x11vnc -display :1 -passwd "$VNC_PASS" -forever -shared -rfbport 5900 > /tmp/x11vnc.log 2>&1 &
          sleep 3

      # ─── 4. Avvia noVNC ─────────────────────────────────────────────────────
      - name: Start noVNC
        run: |
          nohup python3 /tmp/noVNC/utils/novnc_proxy --vnc localhost:5900 --listen 6080 > /tmp/novnc.log 2>&1 &
          sleep 3

      # ─── 5. Tunnel Blindato Ngrok Integrato ──────────────────────────────────
      - name: Start Ngrok Tunnel
        run: |
          # Scarica il client ufficiale ngrok ed esegue il tunnel sulla porta di noVNC
          curl -s https://bin.equinox.io/c/b34198102db/ngrok-stable-linux-amd64.tgz | tar xz -C /tmp
          
          # Avvia il tunnel senza account (Ngrok offre sessioni di prova temporanee anonime per sviluppatori)
          nohup /tmp/ngrok http 6080 > /tmp/ngrok.log 2>&1 &
          sleep 5
          
          # Estrae l'URL pubblico sicuro direttamente dall'interfaccia di controllo interna
          URL=$(curl -s http://localhost:4040/api/tunnels | python3 -c "import sys, json; print(json.load(sys.stdin)['tunnels'][0]['public_url'])" 2>/dev/null)
          if [ -n "$URL" ]; then
            # Forza l'indirizzo in HTTPS sicuro per evitare i blocchi di Safari
            CLEAN_URL=$(echo "$URL" | sed 's/http:\/\//https:\/\//g')
            echo "TUNNEL_URL=$CLEAN_URL" >> "$GITHUB_ENV"
            echo "✅ Tunnel Ngrok attivato!"
          else
            echo "❌ Caduta connessione tunnel o limiti superati. Log:"
            cat /tmp/ngrok.log
            exit 1
          fi

      # ─── 6. Mostra il link per connetterti ──────────────────────────────────
      - name: Display connection info
        run: |
          SESSION_DURATION="${{ github.event.inputs.session_duration }}"
          END_TIME=$(python3 -c "import datetime; print((datetime.datetime.utcnow() + datetime.timedelta(minutes=$SESSION_DURATION)).strftime('%H:%M UTC'))")

          echo ""
          echo "╔══════════════════════════════════════════════════════════════╗"
          echo "║       🖥️  IL TUO DESKTOP CLOUD È PRONTO E FUNZIONANTE!       ║"
          echo "╠══════════════════════════════════════════════════════════════╣"
          echo "║                                                              ║"
          echo "║  👉 ${TUNNEL_URL}/vnc.html?autoconnect=true&password=${VNC_PASS}"
          echo "║                                                              ║"
          printf "║  🔑 Password VNC :  %-41s║\n" "$VNC_PASS"
          printf "║  ⏱️  Attivo fino  :  %-41s║\n" "$END_TIME"
          echo "╚══════════════════════════════════════════════════════════════╝"
          echo ""

      # ─── 7. Mantieni vivo il flusso ─────────────────────────────────────────
      - name: Keep session alive
        run: |
          SESSION_DURATION="${{ github.event.inputs.session_duration }}"
          SLEEP_SECONDS=$(( SESSION_DURATION * 60 ))
          sleep $SLEEP_SECONDS

