name: Interfaccia Grafica macOS 26 Tahoe

on: 
  workflow_dispatch: # Avvio manuale con un clic

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  gui-mac:
    runs-on: macos-26

    steps:
      - name: Checkout del codice
        uses: actions/checkout@v4.2.2

      # 1. Configura la password di accesso al desktop grafico nativo
      - name: Configura Password di Accesso
        run: |
          DYNAMIC_PASS=$(openssl rand -base64 9 | tr -dc 'a-zA-Z0-9')
          echo "=================================================="
          echo "LA TUA PASSWORD DI ACCESSO GRAFICO È: $DYNAMIC_PASS"
          echo "=================================================="
          
          # Cambia la password del pannello VNC nativo di macOS
          mkdir -p ~/.vnc
          sudo defaults write /Library/Preferences/com.apple.VNCSettings.txt Password -string "$DYNAMIC_PASS"
          
          # Attiva la condivisione dello schermo ufficiale integrata in Apple Tahoe
          sudo launchctl load -w /System/Library/LaunchDaemons/com.apple.screensharing.plist 2>/dev/null || true

      # 2. Installa ed esegue il tunnel tramite Homebrew (Evita file zip corrotti)
      - name: Avvia il Tunnel per la GUI
        run: |
          echo "Installazione ufficiale di ngrok in corso..."
          export HOMEBREW_NO_ENV_HINTS=1
          
          # Installa ngrok usando il gestore pacchetti nativo del Mac
          brew install ngrok/ngrok/ngrok --quiet
          
          # Avvia il tunnel sulla porta TCP 5900 (la porta dello schermo del Mac)
          ngrok tcp 5900 --log=stdout > /dev/null &
          sleep 8
          
          echo "=================================================="
          echo "DATI PER IL TUO CLIENT VNC (Es: RealVNC o Condivisione Schermo):"
          # Interroga le API locali di ngrok per estrarre l'indirizzo TCP live
          curl -s http://localhost:4040/api/tunnels | grep -o 'tcp://[^"]*' || echo "Nessun tunnel trovato. Verifica i dettagli o riavvia."
          echo "=================================================="
          
          # Blocca il flusso per mantenere la macchina sempre online per te
          while true; do
            sleep 10
          done
