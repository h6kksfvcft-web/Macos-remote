name: Mac OS con Bore (Vero VNC)

on:
  workflow_dispatch:

jobs:
  macos-desktop:
    runs-on: macos-latest
    timeout-minutes: 60

    steps:
      # ─── 1. Forza la password VNC senza toccare gli utenti di sistema ─────
      - name: Enable Apple Remote Desktop with VNC Password
        run: |
          # Attiviamo lo Screen Sharing nativo
          sudo /System/Library/CoreServices/RemoteManagement/ARDAgent.app/Contents/Resources/kickstart -activate -configure -access -on -restart -agent -privs -all
          
          # Configura la password VNC universale scavalcando i blocchi di sistema
          sudo /System/Library/CoreServices/RemoteManagement/ARDAgent.app/Contents/Resources/kickstart -configure -clientopts -setvncpasswd -vncpasswd Simona26
          echo "✅ VNC Apple sbloccato con password universale!"

      # ─── 2. Installa Bore tramite Homebrew ──────────────────────────────────────
      - name: Install Bore via Brew
        run: |
          brew install bore-cli

      # ─── 3. Avvia il tunnel Bore ────────────────────────────────────────────────
      - name: Start Bore Tunnel
        run: |
          nohup bore local 5900 --to bore.pub </dev/null >/tmp/bore.log 2>&1 &
          sleep 5

      # ─── 4. Leggi il log e mostra l'indirizzo esatto ─────────────────────────────
      - name: Get Connection Link
        run: |
          cat /tmp/bore.log
          BORE_URL=$(grep -oE "bore.pub:[0-9]+" /tmp/bore.log | head -n 1)
          
          echo "╔══════════════════════════════════════════════════════════════╗"
          echo "║       🍏 IL TUO MAC IN CLOUD È PRONTO!                       ║"
          echo "╠══════════════════════════════════════════════════════════════╣"
          echo "║                                                              ║"
          echo "║  Apri l'app RealVNC Viewer sul tuo iPhone e inserisci:       ║"
          echo "║                                                              ║"
          echo "║  👉 INDIRIZZO:  $BORE_URL                                    ║"
          echo "║                                                              ║"
          echo "║  Quando ti connetti lascia il campo USERNAME VUOTO e metti:  ║"
          echo "║  👉 PASSWORD:   Simona26                                     ║"
          echo "║                                                              ║"
          echo "╚══════════════════════════════════════════════════════════════╝"

      # ─── 5. Mantieni vivo il Mac ────────────────────────────────────────────────
      - name: Keep Alive
        run: sleep 3600
