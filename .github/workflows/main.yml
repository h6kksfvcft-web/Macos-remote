name: GUI macOS 26 per iPhone

on: 
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  gui-mac:
    runs-on: macos-26

    steps:
      - name: Checkout del codice
        uses: actions/checkout@v4.2.2

      # 1. Configura la password del server VNC Apple nativo
      - name: Configura Password di Accesso
        run: |
          DYNAMIC_PASS=$(openssl rand -base64 9 | tr -dc 'a-zA-Z0-9')
          echo "=================================================="
          echo "LA TUA PASSWORD DI ACCESSO GRAFICO È: $DYNAMIC_PASS"
          echo "=================================================="
          
          # Imposta la chiave d'accesso per il servizio VNC ufficiale Apple
          sudo defaults write /Library/Preferences/com.apple.VNCSettings.txt Password -string "$DYNAMIC_PASS"
          
          # Attiva la Condivisione Schermo ufficiale nativa di macOS Tahoe
          sudo launchctl load -w /System/Library/LaunchDaemons/com.apple.screensharing.plist 2>/dev/null || true

      # 2. Configura ed esegue il proxy frp per iPhone
      - name: Avvia il Tunnel per iPhone
        run: |
          echo "Configurazione del tunnel grafico ad alta velocità..."
          
          # Scarica il client frp ufficiale per l'architettura Apple Silicon (ARM64)
          curl -sL https://github.com -o frp.tar.gz
          tar -xzf frp.tar.gz
          cd frp_0.54.0_darwin_arm64
          
          # Genera una porta casuale sul server pubblico per evitare conflitti (tra 10000 e 50000)
          REMOTE_PORT=$((10000 + RANDOM % 40000))
          
          # Crea il file di configurazione per il proxy grafico TCP
          cat <<EOF > frpc.toml
          serverAddr = "freefrp.net"
          serverPort = 7000

          [[proxies]]
          name = "macos-remote-$(openssl rand -hex 3)"
          type = "tcp"
          localIp = "127.0.0.1"
          localPort = 5900
          remotePort = $REMOTE_PORT
          EOF
          
          echo "=================================================="
          echo "INDIRIZZO DA INSERIRE NELL'APP VNC DEL TUO IPHONE:"
          echo "freefrp.net:$REMOTE_PORT"
          echo "=================================================="
          
          # Avvia il tunnel in background
          ./frpc -c frpc.toml &
          sleep 5
          
          # Ciclo infinito per impedire la chiusura della macchina
          while true; do
            sleep 10
          done
