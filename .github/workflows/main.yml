name: Pure Native macOS Cloud

on:
  workflow_dispatch:
    inputs:
      session_duration:
        description: "Durata in minuti"
        required: false
        default: "30"
        type: string
      vnc_password:
        description: "Password d'accesso"
        required: false
        default: "SimoneLia2026"
        type: string

jobs:
  native-apple:
    runs-on: macos-latest
    timeout-minutes: 60

    steps:
      # ─── 1. Installa Ngrok tramite Homebrew ──────────────────────────────
      - name: Install Network Tools
        run: |
          brew install ngrok

      # ─── 2. Attiva lo Screen Sharing Ufficiale Apple ──────────────────────
      - name: Enable Native macOS Screen Sharing
        run: |
          # Spegniamo il firewall di macOS per evitare ostruzioni locali
          sudo /usr/libexec/ApplicationFirewall/socketfilterfw --setglobalstate off
          
          # Forziamo il sistema ad accettare password VNC standard
          sudo defaults write /Library/Preferences/com.apple.RemoteManagement VNCAlwaysMultiUser -bool true
          sudo defaults write /Library/Preferences/com.apple.RemoteManagement VNCAcceptAllConnections -bool true
          
          # Impostiamo la tua password nel pannello Apple
          sudo /System/Library/CoreServices/RemoteManagement/ARDAgent.app/Contents/Resources/kickstart \
            -configure -clientopts -setvncpasswd -vncpasswd "${{ github.event.inputs.vnc_password }}"
          
          # Avviamo il servizio nativo con i massimi privilegi
          sudo /System/Library/CoreServices/RemoteManagement/ARDAgent.app/Contents/Resources/kickstart \
            -activate -configure -access -on -privs -all -restart -agent
          
          echo "✅ Server nativo Apple attivato sulla porta 5900!"

      # ─── 3. Avvia il Tunnel Ngrok in modalità TCP ───────────────────────
      - name: Connect Ngrok TCP Tunnel
        run: |
          # Configura il tuo token
          ngrok config add-authtoken "3EoMAQM9GPofB8ve0Ur2rgD5K8t_2tqfrr56vyM8QNhUNiELX"
          
          # Apriamo un tunnel TCP diretto sulla porta 5900 (quella del Mac)
          nohup ngrok tcp 5900 </dev/null >/tmp/ngrok.log 2>&1 &
          sleep 10
          
          # Estraiamo l'indirizzo pubblico dedicato
          URL=$(curl -s http://localhost:4040/api/tunnels | python3 -c "import sys, json; print(json.load(sys.stdin)['tunnels'][0]['public_url'])" 2>/dev/null || echo "ERROR")
          
          if [ "$URL" = "ERROR" ] || [ -z "$URL" ]; then
            echo "❌ Errore tunnel Ngrok:"
            cat /tmp/ngrok.log
            exit 1
          fi
          
          # Puliamo l'URL rimuovendo il prefisso "tcp://"
          CLEAN_URL=$(echo "$URL" | sed 's/tcp:\/\///g')
          echo "VNC_URL=$CLEAN_URL" >> "$GITHUB_ENV"

      # ─── 4. Mostra i dati di connessione per l'Applicazione ───────────────
      - name: Display Connection Link
        run: |
          echo "╔══════════════════════════════════════════════════════════════╗"
          echo "║       🍏 IL TUO AMBIENTE DI TEST MAC OS È IN LINEA!          ║"
          echo "╠══════════════════════════════════════════════════════════════╣"
          echo "║                                                              ║"
          echo "║  Scarica l'app 'VNC Viewer' sul tuo iPhone/iPad e inserisci: ║"
          echo "║                                                              ║"
          echo "║  👉 INDIRIZZO (Address): ${VNC_URL}"
          echo "║  👉 PASSWORD:            ${{ github.event.inputs.vnc_password }}"
          echo "║                                                              ║"
          echo "╚══════════════════════════════════════════════════════════════╝"

      # ─── 5. Mantieni attiva la sessione ───────────────────────────────────
      - name: Keep macOS alive
        run: |
          SESSION_DURATION="${{ github.event.inputs.session_duration }}"
          SLEEP_SECONDS=$(( SESSION_DURATION * 60 ))
          echo "⏳ Il Mac rimarrà acceso per $SESSION_DURATION minuti..."
          sleep $SLEEP_SECONDS
