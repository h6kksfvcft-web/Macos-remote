name: PearOS Desktop - 6 Hours

on: 
  workflow_dispatch:
    inputs:
      ram:
        description: 'RAM (GB)'
        default: '7'
        type: choice
        options:
          - '2'
          - '4'
          - '8'
      cpu_cores:
        description: 'CPU Cores'
        default: '2'
        type: choice
        options:
          - '1'
          - '2'
          - '4'

jobs:
  vm:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup VM environment
        run: |
          sudo apt update
          sudo apt install -y qemu-kvm qemu-system-x86_64 qemu-utils \
            xvfb x11vnc fluxbox novnc websockify tigervnc-standalone-server \
            wget unzip curl
      
      - name: Download PearOS
        run: |
          # Prova diversi mirror
          wget --tries=3 --timeout=30 \
            -O pearos.iso \
            "https://sourceforge.net/projects/pearos/files/pearos.iso/download" \
            || wget -O pearos.iso "https://github.com/pearos/pearos/releases/download/latest/pearos.iso" \
            || echo "⚠️ Impossibile scaricare PearOS, usa un URL valido"
      
      - name: Start X11 and VNC
        run: |
          # Configura display virtuale
          Xvfb :99 -screen 0 1280x800x24 &
          export DISPLAY=:99
          
          # Avvia VNC
          mkdir -p ~/.vnc
          echo "pearos123" | vncpasswd -f > ~/.vnc/passwd
          chmod 600 ~/.vnc/passwd
          vncserver :99 -geometry 1280x800 -depth 24
          
          # Avvia noVNC
          git clone https://github.com/novnc/noVNC.git /tmp/novnc
          /tmp/novnc/utils/novnc_proxy --vnc localhost:5999 --listen 8080 &
      
      - name: Boot PearOS VM
        run: |
          export DISPLAY=:99
          
          # Crea disco virtuale
          qemu-img create -f qcow2 disk.qcow2 20G
          
          # Avvia QEMU con KVM
          sudo qemu-system-x86_64 \
            -m ${{ github.event.inputs.ram || 4 }}G \
            -cpu host \
            -enable-kvm \
            -smp cores=${{ github.event.inputs.cpu_cores || 2 }} \
            -drive file=disk.qcow2,format=qcow2 \
            -cdrom pearos.iso \
            -boot order=d \
            -vnc :99 \
            -usb -device usb-tablet \
            -netdev user,id=net0,hostfwd=tcp::3389-:3389 \
            -device e1000,netdev=net0 \
            -machine type=pc,accel=kvm \
            -soundhw hda \
            -device virtio-vga \
            -display vnc=:99 &
          
          echo "✅ PearOS VM in esecuzione!"
          echo "🔗 VNC: localhost:5999"
          echo "🌐 Web: http://localhost:8080/vnc.html"
          echo "⏱️  Scadenza: 6 ore"
          
          # Mantieni attivo
          sleep 21600  # 6 ore
