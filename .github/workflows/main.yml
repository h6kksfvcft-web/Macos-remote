name: GUI macOS 26 Corretto per Tahoe

on: 
  workflow_dispatch:

jobs:
  interfaccia-grafica:
    runs-on: macos-26

    steps:
      - name: Checkout del codice
        uses: actions/checkout@v4

      # Configura lo schermo con comandi specifici per macOS Tahoe
      - name: Configura Schermo con Password Casuale
        run: |
          DYNAMIC_PASS=$(openssl rand -base64 9 | tr -dc 'a-zA-Z0-9')
          echo "=================================================="
          echo "LA TUA PASSWORD DI ACCESSO È: $DYNAMIC_PASS"
          echo "=================================================="
          
          # Cambia la password in modo forzato senza chiedere la vecchia (specifico per macOS)
          sudo sysadminctl -deleteUserPassword runner
          sudo sysadminctl -resetPasswordFor runner -newPassword "$DYNAMIC_PASS"
          
          # Attiva la condivisione schermo con la sintassi corretta per Tahoe
          sudo /System/Library/CoreServices/RemoteManagement/ARDAgent.app/Contents/Resources/kickstart \
            -activate -configure -access -on \
            -privs -all \
            -restart -agent

      # Installa tmate e blocca la sessione per l'uso
      - name: Installa e Avvia Tunnel Grafico
        run: |
          export HOMEBREW_NO_ENV_HINTS=1
          brew install tmate --quiet
          
          ssh-keygen -t rsa -f ~/.ssh/id_rsa -q -N ""
          
          tmate -S /tmp/tmate.sock new-session -d
          tmate -S /tmp/tmate.sock wait tmate-ready
          
          echo "=================================================="
          echo "LINK PER CONNETTERTI IN INTERFACCIA GRAFICA:"
          tmate -S /tmp/tmate.sock display -p '#{tmate_web}'
          echo "=================================================="
          
          # Forza il mantenimento dello stato attivo della macchina
          while [ -f /tmp/tmate.sock ]; do 
            sleep 5
          done
