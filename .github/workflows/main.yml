name: Windows Remote Desktop Cloud

on:
  workflow_dispatch:
    inputs:
      session_duration:
        description: "Durata in minuti"
        required: false
        default: "60"
        type: string
      rdp_password:
        description: "Imposta la password d'accesso (Minimo 6 caratteri)"
        required: false
        default: "SimoneLia2026"
        type: string

jobs:
  windows-rdp:
    runs-on: windows-latest
    timeout-minutes: 65

    steps:
      # ─── 1. Installa Ngrok tramite Chocolatey ────────────────────────────
      - name: Install Ngrok
        run: |
          choco install ngrok -y

      # ─── 2. Configura l'Authtoken e avvia il Tunnel RDP (Porta 3389) ──────
      - name: Connect Ngrok Tunnel
        run: |
          # Aggiungiamo il tuo token di autenticazione
          ngrok config add-authtoken "3EoMAQM9GPofB8ve0Ur2rgD5K8t_2tqfrr56vyM8QNhUNiELX"
          
          # Avviamo il tunnel TCP sulla porta standard del desktop remoto (3389)
          Start-Process ngrok -ArgumentList "tcp 3389" -WindowStyle Hidden
          Start-Sleep -Seconds 10

      # ─── 3. Attiva il Desktop Remoto in Windows e imposta la Password ────
      - name: Enable Windows Remote Desktop
        run: |
          # Abilitiamo le chiavi di registro per consentire le connessioni RDP
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -name "fDenyTSConnections" -Value 0
          Enable-NetFirewallRule -DisplayGroup "Remote Desktop"
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' -name "UserAuthentication" -Value 1
          
          # Cambiamo la password dell'utente 'runneradmin' con quella scelta da te
          $Password = ConvertTo-SecureString "${{ github.event.inputs.rdp_password }}" -AsPlainText -Force
          Set-LocalUser -Name "runneradmin" -Password $Password
          
          echo "✅ Windows Remote Desktop configurato correttamente!"

      # ─── 4. Estrai l'IP e la Porta Generati da Ngrok ──────────────────────
      - name: Display Connection Details
        run: |
          # Interroghiamo le API locali di Ngrok per recuperare l'indirizzo pubblico TCP
          $NgrokApi = Invoke-RestMethod -Uri "http://127.0.0.1:4040/api/tunnels"
          $PublicUrl = $NgrokApi.tunnels.public_url
          $CleanAddress = $PublicUrl -replace "tcp://", ""
          
          Write-Host "╔══════════════════════════════════════════════════════════════╗" -ForegroundColor Green
          Write-Host "║       🪟 IL TUO AMBIENTE DI TEST WINDOWS È IN LINEA!          ║" -ForegroundColor Green
          Write-Host "╠══════════════════════════════════════════════════════════════╣" -ForegroundColor Green
          Write-Host "║                                                              ║" -ForegroundColor Green
          Write-Host "║  Usa l'app ufficiale 'Remote Desktop' (di Microsoft)         ║" -ForegroundColor Green
          Write-Host "║                                                              ║" -ForegroundColor Green
          Write-Host "║  👉 INDIRIZZO PC (IP:Porta): $CleanAddress" -ForegroundColor Yellow
          Write-Host "║  👉 NOME UTENTE:             runneradmin" -ForegroundColor Yellow
          Write-Host "║  👉 PASSWORD:                ${{ github.event.inputs.rdp_password }}" -ForegroundColor Yellow
          Write-Host "║                                                              ║" -ForegroundColor Green
          Write-Host "╚══════════════════════════════════════════════════════════════╝" -ForegroundColor Green

      # ─── 5. Mantieni attiva la sessione ───────────────────────────────────
      - name: Keep Windows Alive
        run: |
          $Minutes = [int]"${{ github.event.inputs.session_duration }}"
          $Seconds = $Minutes * 60
          Write-Host "⏳ La macchina rimarrà attiva per $Minutes minuti..."
          Start-Sleep -Seconds $Seconds
