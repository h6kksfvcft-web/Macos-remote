name: macOS Sequoia Desktop

on: workflow_dispatch

jobs:
  macos-desktop:
    runs-on: macos-15
    timeout-minutes: 360

    steps:
      - name: Abilita Remote Management
        run: |
          sudo /System/Library/CoreServices/RemoteManagement/ARDAgent.app/Contents/Resources/kickstart \
            -activate -configure -access -on -restart -agent -menu
          
          sudo /System/Library/CoreServices/RemoteManagement/ARDAgent.app/Contents/Resources/kickstart \
            -configure -allowAccessFor -allUsers -privs -all
          
          echo "✅ Remote Management attivato"

      - name: Scarica e installa TeamViewer
        run: |
          curl -L -o TeamViewer.dmg "https://download.teamviewer.com/download/TeamViewer.dmg"
          sudo hdiutil attach TeamViewer.dmg -nobrowse
          
          VOLUME_PATH=$(ls -d /Volumes/TeamViewer* 2>/dev/null | head -1)
          echo "Volume montato: $VOLUME_PATH"
          
          PKG_PATH="$VOLUME_PATH/Install TeamViewer.app/Contents/Resources/Install TeamViewer.pkg"
          
          if [ -f "$PKG_PATH" ]; then
            echo "✅ Trovato pacchetto, installo..."
            sudo installer -pkg "$PKG_PATH" -target /
          else
            echo "❌ Pacchetto non trovato"
            exit 1
          fi
          
          sudo hdiutil detach "$VOLUME_PATH" 2>/dev/null || true
          sudo xattr -d com.apple.quarantine /Applications/TeamViewer.app 2>/dev/null || true
          
          echo "✅ TeamViewer installato"

      - name: Avvia TeamViewer e ottieni ID
        run: |
          # Avvia TeamViewer
          open /Applications/TeamViewer.app &
          
          # Aspetta l'avvio completo
          sleep 20
          
          # Leggi l'ID da diversi file di configurazione
          TV_ID=""
          
          # Prova a leggere dal plist
          if [ -f ~/Library/Preferences/com.teamviewer.teamviewer.plist ]; then
            TV_ID=$(defaults read ~/Library/Preferences/com.teamviewer.teamviewer.plist "ClientID" 2>/dev/null || echo "")
          fi
          
          # Se non funziona, prova dal file di configurazione
          if [ -z "$TV_ID" ]; then
            CONFIG_FILE=~/Library/Application\ Support/TeamViewer/Config/TeamViewer.conf
            if [ -f "$CONFIG_FILE" ]; then
              TV_ID=$(grep -o 'ClientID=[0-9]*' "$CONFIG_FILE" | cut -d'=' -f2)
            fi
          fi
          
          # Se ancora non funziona, prova con sqlite
          if [ -z "$TV_ID" ]; then
            DB_FILE=~/Library/Application\ Support/TeamViewer/TeamViewer.sqlite
            if [ -f "$DB_FILE" ]; then
              TV_ID=$(sqlite3 "$DB_FILE" "SELECT value FROM Config WHERE key='ClientID'" 2>/dev/null || echo "")
            fi
          fi
          
          # Se non troviamo l'ID, mostriamo come trovarlo manualmente
          if [ -z "$TV_ID" ]; then
            TV_ID="NON TROVATO - Vedi istruzioni sotto"
          fi
          
          echo "========================================="
          echo "✅ macOS Sequoia pronto!"
          echo "========================================="
          echo "🔑 TeamViewer ID: $TV_ID"
          echo "⏱️  Durata: 6 ore"
          echo "========================================="
          echo ""
          echo "📌 Se l'ID non è visibile sopra:"
          echo "   1. L'ID è mostrato nell'app TeamViewer"
          echo "   2. Controlla i log del workflow per il dettaglio"
          echo ""
          echo "📌 Per vedere l'ID manualmente:"
          echo "   defaults read ~/Library/Preferences/com.teamviewer.teamviewer.plist ClientID"
          echo "   o"
          echo "   cat ~/Library/Application\ Support/TeamViewer/Config/TeamViewer.conf | grep ClientID"
          
          sleep 21600

      - name: Keep alive
        run: |
          while true; do
            echo "🔄 Desktop attivo - $(date '+%Y-%m-%d %H:%M:%S')"
            echo "📊 Processi TeamViewer:"
            ps aux | grep -i teamviewer | grep -v grep | wc -l
            echo "📊 Connessioni:"
            lsof -i :5938 2>/dev/null | wc -l
            echo "---"
            sleep 300
          done
