name: macOS Remote Desktop (RustDesk Self-Hosted)

on:
  workflow_dispatch:
    inputs:
      session_duration:
        description: "Durata sessione in minuti (max 360)"
        required: false
        default: "60"
        type: string
      rustdesk_password:
        description: "Password RustDesk (lascia vuoto per auto-generata)"
        required: false
        default: ""
        type: string

jobs:
  remote-desktop:
    runs-on: macos-latest
    timeout-minutes: 360

    steps:
      # ─── 1. Installa RustDesk client ────────────────────────────────────────
      - name: Install RustDesk
        run: |
          brew install --cask rustdesk
          echo "✅ RustDesk installato"

      # ─── 2. Scarica e avvia hbbs + hbbr (server self-hosted) ───────────────
      - name: Start RustDesk self-hosted server
        run: |
          mkdir -p /tmp/rustdesk-server
          cd /tmp/rustdesk-server

          # Scarica l'ultima release del server RustDesk per macOS
          SERVER_URL=$(curl -s https://api.github.com/repos/rustdesk/rustdesk-server/releases/latest \
            | grep "browser_download_url" \
            | grep "osx" \
            | head -1 \
            | cut -d '"' -f 4)

          echo "Server URL: $SERVER_URL"
          curl -L "$SERVER_URL" -o rustdesk-server.zip
          unzip -q rustdesk-server.zip
          chmod +x hbbs hbbr 2>/dev/null || chmod +x */hbbs */hbbr 2>/dev/null || true

          # Trova i binari
          HBBS=$(find . -name "hbbs" -type f | head -1)
          HBBR=$(find . -name "hbbr" -type f | head -1)
          echo "hbbs: $HBBS"
          echo "hbbr: $HBBR"

          # Avvia hbbs (rendezvous server) e hbbr (relay server)
          nohup "$HBBS" > /tmp/hbbs.log 2>&1 &
          sleep 3
          nohup "$HBBR" > /tmp/hbbr.log 2>&1 &
          sleep 5

          echo "=== hbbs log ==="
          cat /tmp/hbbs.log || true

          # Ottieni la chiave pubblica generata da hbbs
          PUB_KEY=$(cat id_ed25519.pub 2>/dev/null || cat /tmp/rustdesk-server/id_ed25519.pub 2>/dev/null || true)
          echo "PUB_KEY=$PUB_KEY" >> "$GITHUB_ENV"
          echo "✅ Server avviato. Chiave pubblica: $PUB_KEY"

      # ─── 3. Ottieni IP pubblico del runner ──────────────────────────────────
      - name: Get runner public IP
        run: |
          PUBLIC_IP=$(curl -s https://api.ipify.org || curl -s https://ifconfig.me || echo "127.0.0.1")
          echo "PUBLIC_IP=$PUBLIC_IP" >> "$GITHUB_ENV"
          echo "✅ IP pubblico: $PUBLIC_IP"

      # ─── 4. Configura RustDesk client per usare il server locale ────────────
      - name: Configure RustDesk client
        run: |
          if [ -n "${{ github.event.inputs.rustdesk_password }}" ]; then
            REMOTE_PASS="${{ github.event.inputs.rustdesk_password }}"
          else
            REMOTE_PASS="$(openssl rand -hex 6)"
          fi
          echo "REMOTE_PASS=$REMOTE_PASS" >> "$GITHUB_ENV"

          CONF_DIR="$HOME/Library/Preferences/com.carriez.rustdesk"
          mkdir -p "$CONF_DIR"

          # Punta al server self-hosted (localhost = stesso runner)
          cat > "$CONF_DIR/RustDesk2.toml" << TOML
          rendezvous_server = "127.0.0.1"
          nat_type = 1

          [options]
          custom-rendezvous-server = "127.0.0.1"
          relay-server = "127.0.0.1"
          api-server = "http://127.0.0.1:21114"
          key = "$PUB_KEY"
          verification-method = "use-permanent-password"
          permanent-password = "$REMOTE_PASS"
          enable-keyboard = "Y"
          enable-clipboard = "Y"
          TOML

          echo "✅ Config RustDesk client scritta"
          cat "$CONF_DIR/RustDesk2.toml"

      # ─── 5. Avvia RustDesk client in modalità server ────────────────────────
      - name: Start RustDesk client
        run: |
          RUSTDESK="/Applications/RustDesk.app/Contents/MacOS/rustdesk"
          echo "RUSTDESK_BIN=$RUSTDESK" >> "$GITHUB_ENV"

          nohup "$RUSTDESK" --server > /tmp/rustdesk-client.log 2>&1 &
          sleep 15

          echo "=== RustDesk client log ==="
          cat /tmp/rustdesk-client.log || true

      # ─── 6. Recupera l'ID RustDesk ──────────────────────────────────────────
      - name: Get RustDesk ID
        run: |
          RUSTDESK="/Applications/RustDesk.app/Contents/MacOS/rustdesk"

          # Metodo 1: CLI
          RUSTDESK_ID=$("$RUSTDESK" --get-id 2>/dev/null | tr -d '[:space:]')

          # Metodo 2: config file
          if [ -z "$RUSTDESK_ID" ]; then
            CONF="$HOME/Library/Preferences/com.carriez.rustdesk/RustDesk2.toml"
            RUSTDESK_ID=$(grep '^id' "$CONF" 2>/dev/null | awk -F'"' '{print $2}')
          fi

          # Metodo 3: log
          if [ -z "$RUSTDESK_ID" ]; then
            RUSTDESK_ID=$(grep -oE '[0-9]{9,12}' /tmp/rustdesk-client.log 2>/dev/null | head -1)
          fi

          echo "RUSTDESK_ID=${RUSTDESK_ID:-NON_TROVATO}" >> "$GITHUB_ENV"
          echo "✅ RustDesk ID: ${RUSTDESK_ID:-non trovato}"

      # ─── 7. Mostra credenziali ──────────────────────────────────────────────
      - name: Display connection info
        run: |
          SESSION_DURATION="${{ github.event.inputs.session_duration }}"
          END_TIME=$(date -v+"${SESSION_DURATION}M" "+%H:%M UTC")

          echo ""
          echo "╔══════════════════════════════════════════════════════════════╗"
          echo "║     🖥️  RUSTDESK SELF-HOSTED – ACCESSO REMOTO PRONTO         ║"
          echo "╠══════════════════════════════════════════════════════════════╣"
          printf "║  📍 ID RustDesk  :  %-41s║\n" "$RUSTDESK_ID"
          printf "║  🔑 Password     :  %-41s║\n" "$REMOTE_PASS"
          printf "║  🌐 Server IP    :  %-41s║\n" "$PUBLIC_IP"
          printf "║  🔐 Chiave pub   :  %-41s║\n" "${PUB_KEY:0:40}"
          printf "║  ⏱️  Attivo fino  :  %-41s║\n" "$END_TIME"
          echo "╠══════════════════════════════════════════════════════════════╣"
          echo "║  Come connettersi:                                           ║"
          echo "║  1. Apri RustDesk → Impostazioni → Rete                     ║"
          echo "║  2. Server ID: inserisci l'IP sopra                         ║"
          echo "║  3. Chiave: inserisci la chiave pubblica sopra              ║"
          echo "║  4. Salva, torna alla home, digita l'ID e connettiti        ║"
          echo "╚══════════════════════════════════════════════════════════════╝"
          echo ""

          echo "::add-mask::$REMOTE_PASS"

      # ─── 8. Mantieni la sessione viva ───────────────────────────────────────
      - name: Keep session alive
        run: |
          RUSTDESK="/Applications/RustDesk.app/Contents/MacOS/rustdesk"
          SESSION_DURATION="${{ github.event.inputs.session_duration }}"
          SLEEP_SECONDS=$(( SESSION_DURATION * 60 ))
          ELAPSED=0

          echo "Sessione attiva per $SESSION_DURATION minuti."
          echo "Per chiudere prima: annulla il workflow da GitHub Actions."

          while [ $ELAPSED -lt $SLEEP_SECONDS ]; do
            NEXT=$(( 300 < (SLEEP_SECONDS - ELAPSED) ? 300 : (SLEEP_SECONDS - ELAPSED) ))
            sleep $NEXT
            ELAPSED=$(( ELAPSED + NEXT ))
            REMAINING=$(( (SLEEP_SECONDS - ELAPSED) / 60 ))
            [ $REMAINING -gt 0 ] && echo "⏳ $REMAINING minuti rimanenti"

            # Watchdog
            pgrep -q rustdesk || nohup "$RUSTDESK" --server >> /tmp/rustdesk-client.log 2>&1 &
            pgrep -q hbbs     || nohup /tmp/rustdesk-server/hbbs >> /tmp/hbbs.log 2>&1 &
            pgrep -q hbbr     || nohup /tmp/rustdesk-server/hbbr >> /tmp/hbbr.log 2>&1 &
          done

          echo "✅ Sessione terminata."
