name: macOS Sequoia Desktop

on: workflow_dispatch

jobs:
  macos-desktop:
    runs-on: macos-15
    timeout-minutes: 360

    steps:
      - name: Abilita Remote Management
        run: |
          sudo /System/Library/CoreServices/RemoteManagement/ARDAgent.app/Contents/Resources/kickstart \
            -activate -configure -access -on -restart -agent -menu
          
          sudo /System/Library/CoreServices/RemoteManagement/ARDAgent.app/Contents/Resources/kickstart \
            -configure -allowAccessFor -allUsers -privs -all
          
          echo "✅ Remote Management attivato"

      - name: Scarica e installa TeamViewer
        run: |
          # Scarica TeamViewer
          curl -L -o TeamViewer.dmg "https://download.teamviewer.com/download/TeamViewer.dmg"
          
          # Monta il DMG
          sudo hdiutil attach TeamViewer.dmg -nobrowse
          
          # Trova il volume
          VOLUME_PATH=$(ls -d /Volumes/TeamViewer* 2>/dev/null | head -1)
          echo "Volume montato: $VOLUME_PATH"
          
          # Mostra contenuto
          ls -la "$VOLUME_PATH"
          
          # Estrai il contenuto dell'installer
          INSTALLER_PATH="$VOLUME_PATH/Install TeamViewer.app"
          
          if [ -d "$INSTALLER_PATH" ]; then
            echo "✅ Trovato installer, estraggo i file..."
            
            # Crea una directory temporanea per estrarre
            mkdir -p /tmp/teamviewer_extract
            
            # Usa pkgutil per estrarre il contenuto se è un pacchetto
            # Oppure copia manualmente l'app
            
            # Cerca l'app all'interno dell'installer
            APP_PATH=$(find "$INSTALLER_PATH" -name "TeamViewer.app" -type d 2>/dev/null | head -1)
            
            if [ -n "$APP_PATH" ]; then
              echo "✅ Trovata app in: $APP_PATH"
              sudo cp -R "$APP_PATH" /Applications/
            else
              # Se non troviamo l'app, cerchiamo i file .pkg
              PKG_PATH=$(find "$INSTALLER_PATH" -name "*.pkg" -type f 2>/dev/null | head -1)
              
              if [ -n "$PKG_PATH" ]; then
                echo "✅ Trovato pacchetto: $PKG_PATH"
                # Installa il pacchetto
                sudo installer -pkg "$PKG_PATH" -target /
              else
                # Cerchiamo qualsiasi .app
                APP_PATH=$(find "$INSTALLER_PATH" -name "*.app" -type d 2>/dev/null | head -1)
                if [ -n "$APP_PATH" ]; then
                  echo "✅ Trovata app: $APP_PATH"
                  sudo cp -R "$APP_PATH" /Applications/
                else
                  echo "❌ Nessuna app o pkg trovato"
                  find "$INSTALLER_PATH" -type f | head -20
                  exit 1
                fi
              fi
            fi
          else
            echo "❌ Installer non trovato"
            exit 1
          fi
          
          # Smonta il DMG
          sudo hdiutil detach "$VOLUME_PATH" 2>/dev/null || true
          
          # Rimuovi quarantine da tutte le app TeamViewer
          find /Applications -name "TeamViewer.app" -type d 2>/dev/null | while read app; do
            sudo xattr -d com.apple.quarantine "$app" 2>/dev/null || true
          done
          
          echo "✅ TeamViewer installato"

      - name: Trova e avvia TeamViewer
        run: |
          # Cerca TeamViewer in tutte le posizioni possibili
          TV_PATH=$(find /Applications -name "TeamViewer.app" -type d 2>/dev/null | head -1)
          
          if [ -z "$TV_PATH" ]; then
            TV_PATH=$(find ~/Applications -name "TeamViewer.app" -type d 2>/dev/null | head -1)
          fi
          
          if [ -n "$TV_PATH" ]; then
            echo "✅ Trovato TeamViewer: $TV_PATH"
            # Avvia l'app
            open "$TV_PATH" &
            sleep 10
            echo "✅ TeamViewer avviato"
          else
            echo "❌ TeamViewer non trovato"
            echo "📌 Contenuto di /Applications:"
            ls -la /Applications | grep -i teamviewer || echo "Nessun TeamViewer trovato"
            echo ""
            echo "📌 Contenuto di ~/Applications:"
            ls -la ~/Applications 2>/dev/null | grep -i teamviewer || echo "Nessun TeamViewer trovato"
          fi
          
          echo "========================================="
          echo "✅ macOS Sequoia pronto!"
          echo "========================================="
          echo "📌 TeamViewer è in esecuzione"
          echo "   ID: controlla nell'applicazione"
          echo "⏱️  Durata: 6 ore"
          echo "========================================="
          
          sleep 21600

      - name: Keep alive
        run: |
          while true; do
            echo "🔄 Desktop attivo - $(date '+%Y-%m-%d %H:%M:%S')"
            echo "📊 Processi TeamViewer:"
            ps aux | grep -i teamviewer | grep -v grep | wc -l
            echo "📊 App in /Applications:"
            ls /Applications 2>/dev/null | grep -i teamviewer || echo "Nessun TeamViewer trovato"
            echo "---"
            sleep 300
          done
