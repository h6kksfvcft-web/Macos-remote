name: Pure Native macOS Cloud

on:
  workflow_dispatch:
    inputs:
      session_duration:
        description: "Durata in minuti"
        required: false
        default: "60"
        type: string
      vnc_password:
        description: "Password d'accesso (Es. Simona26)"
        required: false
        default: "Simona26"
        type: string

jobs:
  native-apple:
    runs-on: macos-latest
    timeout-minutes: 65

    steps:
      # ─── 1. Installa Ngrok, TigerVNC e Websockify ────────────────────────
      - name: Install Network and VNC Tools
        run: |
          brew install ngrok
          brew install TigerVNC
          pip3 install websockify --break-system-packages

      # ─── 2. Configura e avvia il Server VNC con Python ───────────────────
      - name: Start Independent VNC Server
        run: |
          # Spegniamo il firewall di macOS per sicurezza
          sudo /usr/libexec/ApplicationFirewall/socketfilterfw --setglobalstate off
          
          # Creiamo la cartella per le impostazioni VNC
          mkdir -p ~/.vnc
          
          # Utilizziamo Python per scrivere la password in formato binario compatibile con il VNC
          python3 -c "
          import os
          vnc_pass = '${{ github.event.inputs.vnc_password }}'.encode('utf-8')[:8]
          vnc_pass = vnc_pass.ljust(8, b'\x00')
          # Semplice cifratura VNC (inversione dei bit)
          key = bytes([int('{:08b}'.format(b)[::-1], 2) for b in b'\xe8\x4a\x56\xb1\x97\xda\x0e\x41'])
          encrypted = bytes([b ^ key[i] for i, b in enumerate(vnc_pass)])
          with open(os.path.expanduser('~/.vnc/passwd'), 'wb') as f:
              f.write(encrypted)
          "
          chmod 600 ~/.vnc/passwd
          
          # Avviamo il server grafico TigerVNC usando il percorso assoluto corretto
          /opt/homebrew/bin/vncserver :1 -geometry 1280x720 -depth 24 -localhost no
          
          echo "✅ Server VNC Universale avviato correttamente!"

      # ─── 3. Configura l'interfaccia web noVNC ─────────────────────────────
      - name: Setup Web Interface View
        run: |
          git clone --depth 1 https://github.com/novnc/noVNC.git /tmp/noVNC
          cp /tmp/noVNC/vnc.html /tmp/noVNC/index.html
          
          # Colleghiamo websockify (porta 6080) al server VNC (porta 5901)
          nohup websockify --web=/tmp/noVNC/ 6080 127.0.0.1:5901 </dev/null >/tmp/websockify.log 2>&1 &
          sleep 3

      # ─── 4. Connetti il Tunnel Ngrok in modalità HTTP ────────────────────
      - name: Connect Ngrok HTTP Tunnel
        run: |
          ngrok config add-authtoken "3EoMAQM9GPofB8ve0Ur2rgD5K8t_2tqfrr56vyM8QNhUNiELX"
          
          nohup ngrok http 6080 </dev/null >/tmp/ngrok.log 2>&1 &
          sleep 15
          
          URL=$(curl -s http://localhost:4040/api/tunnels | python3 -c "import sys, json; print(json.load(sys.stdin)['tunnels'][0]['public_url'])" 2>/dev/null || echo "ERROR")
          
          if [ "$URL" = "ERROR" ] || [ -z "$URL" ]; then
            echo "❌ Errore tunnel Ngrok:"
            cat /tmp/ngrok.log
            exit 1
          fi
          
          CLEAN_URL=$(echo "$URL" | sed 's/http:\/\//https:\/\//g')
          echo "TUNNEL_URL=$CLEAN_URL" >> "$GITHUB_ENV"
          echo "VNC_PASS=${{ github.event.inputs.vnc_password }}" >> "$GITHUB_ENV"

      # ─── 5. Mostra il link di connessione finale ──────────────────────────
      - name: Display Connection Link
        run: |
          echo "╔══════════════════════════════════════════════════════════════╗"
          echo "║       🍏 IL TUO AMBIENTE DI TEST MAC OS È IN LINEA!          ║"
          echo "╠══════════════════════════════════════════════════════════════╣"
          echo "║                                                              ║"
          echo "║  👉 ${TUNNEL_URL}/index.html?autoconnect=true&password=${VNC_PASS}"
          echo "║                                                              ║"
          echo "╚══════════════════════════════════════════════════════════════╝"

      # ─── 6. Mantieni attiva la sessione ───────────────────────────────────
      - name: Keep macOS alive
        run: |
          SESSION_DURATION="${{ github.event.inputs.session_duration }}"
          SLEEP_SECONDS=$(( SESSION_DURATION * 60 ))
          echo "⏳ Il Mac rimarrà acceso per $SESSION_DURATION minuti..."
          sleep $SLEEP_SECONDS
