name: Windows VM with AnyDesk

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create local user and enable autologon
        shell: powershell
        run: |
          $username = "runneruser"
          $password = "${{ secrets.WIN_USER_PASSWORD }}"

          net user $username $password /add
          net localgroup administrators $username /add

          $RegPath = "HKLM:\SOFTWARE\Microsoft\Windows NT\CurrentVersion\Winlogon"
          Set-ItemProperty $RegPath "AutoAdminLogon" -Value "1" -Type String
          Set-ItemProperty $RegPath "DefaultUsername" -Value $username -Type String
          Set-ItemProperty $RegPath "DefaultPassword" -Value $password -Type String

      - name: Enable RDP and firewall
        shell: powershell
        run: |
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -Name "fDenyTSConnections" -Value 0
          Enable-NetFirewallRule -DisplayGroup "Remote Desktop"

      - name: Install AnyDesk
        shell: powershell
        run: |
          Invoke-WebRequest -Uri "https://download.anydesk.com/AnyDesk.exe" -OutFile "$env:TEMP\AnyDesk.exe"
          Start-Process -FilePath "$env:TEMP\AnyDesk.exe" -ArgumentList "--install `"C:\Program Files (x86)\AnyDesk`" --start-with-win --silent" -Wait
          Start-Sleep -Seconds 10

      - name: Set AnyDesk password
        shell: powershell
        run: |
          $exe = "C:\Program Files (x86)\AnyDesk\AnyDesk.exe"
          $pw = "${{ secrets.ANYDESK_PASSWORD }}"
          & $exe --set-password=$pw
          Start-Sleep -Seconds 5

      - name: Force a real interactive session via self-RDP
        shell: powershell
        run: |
          $username = "runneruser"
          $password = "${{ secrets.WIN_USER_PASSWORD }}"

          # Save RDP credentials for localhost
          cmdkey /generic:TERMSRV/localhost /user:$username /pass:$password

          # Create an .rdp file that connects to itself
          $rdpContent = @"
          full address:s:localhost
          username:s:$username
          prompt for credentials:i:0
          administrative session:i:0
          "@
          $rdpContent | Out-File -FilePath "$env:TEMP\self.rdp" -Encoding ascii

          # Launch it in background (creates a real session)
          Start-Process "mstsc.exe" -ArgumentList "$env:TEMP\self.rdp" 
          Start-Sleep -Seconds 20

      - name: Show AnyDesk ID
        shell: powershell
        run: |
          $confPath = "C:\ProgramData\AnyDesk\system.conf"
          $line = Select-String -Path $confPath -Pattern "ad.anynet.id"
          Write-Host "===================================="
          Write-Host "AnyDesk ID line: $line"
          Write-Host "===================================="

      - name: Keep VM alive
        shell: powershell
        run: Start-Sleep -Seconds 3600
