name: PearOS VM - 6 Hours

on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * *'

jobs:
  vm:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Install QEMU and dependencies
        run: |
          sudo apt update
          # Il pacchetto corretto per Ubuntu 24.04 è qemu-system-x86
          sudo apt install -y qemu-system-x86 qemu-utils \
            xvfb x11vnc fluxbox xterm \
            tigervnc-standalone-server tigervnc-common \
            wget unzip curl git
          
          # Verifica installazione
          qemu-system-x86_64 --version

      - name: Download PearOS ISO
        run: |
          # Cerca di scaricare PearOS
          echo "⬇️ Scaricando PearOS..."
          
          # Prova diversi URL (modifica con URL valido)
          wget --tries=3 --timeout=60 \
            -O pearos.iso \
            "https://sourceforge.net/projects/pearos/files/latest/download" \
            || wget -O pearos.iso "https://github.com/pearos/pearos/releases/download/v2024/pearos.iso" \
            || echo "⚠️ Usa un URL valido per PearOS"
          
          ls -lh pearos.iso || echo "⚠️ File ISO non trovato"

      - name: Create virtual disk
        run: |
          qemu-img create -f qcow2 disk.qcow2 20G

      - name: Setup VNC and Web interface
        run: |
          # Setup VNC
          mkdir -p ~/.vnc
          echo "pearos123" | vncpasswd -f > ~/.vnc/passwd
          chmod 600 ~/.vnc/passwd
          
          # Avvia Xvfb
          Xvfb :1 -screen 0 1280x720x24 &
          sleep 2
          export DISPLAY=:1
          
          # Avvia VNC server
          vncserver :1 -geometry 1280x720 -depth 24 -rfbauth ~/.vnc/passwd
          sleep 2
          
          # Installa e avvia noVNC
          git clone https://github.com/novnc/noVNC.git /tmp/novnc
          cd /tmp/novnc
          ./utils/launch.sh --vnc localhost:5901 --listen 8080 &
          cd -

      - name: Boot PearOS VM
        run: |
          export DISPLAY=:1
          
          # Avvia la VM
          sudo qemu-system-x86_64 \
            -m 4096 \
            -cpu host \
            -enable-kvm \
            -smp cores=2,threads=1,sockets=1 \
            -drive file=disk.qcow2,format=qcow2 \
            -cdrom pearos.iso \
            -boot order=d \
            -vnc :1 \
            -usb -device usb-tablet \
            -netdev user,id=net0,hostfwd=tcp::2222-:22 \
            -device e1000,netdev=net0 \
            -machine type=pc,accel=kvm \
            -display vnc=:1 &
          
          echo "========================================="
          echo "✅ PearOS VM AVVIATA!"
          echo "========================================="
          echo "🔗 VNC: localhost:5901"
          echo "🌐 Web VNC: http://localhost:8080/vnc.html"
          echo "⏱️  Durata: 6 ore (360 minuti)"
          echo "========================================="
          
          # Aspetta 6 ore
          sleep 21600

      - name: Keep alive (prevent timeout)
        run: |
          # Mantiene il workflow attivo mostrando log
          while true; do
            echo "🔄 VM attiva - $(date '+%Y-%m-%d %H:%M:%S')"
            echo "📊 Uso memoria:"
            free -h
            echo "📊 CPU:"
            top -bn1 | head -20
            sleep 300
          done
