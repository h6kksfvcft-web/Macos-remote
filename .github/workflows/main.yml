name: Mac OS Nativo Libero

on:
  workflow_dispatch:

jobs:
  macos-desktop:
    runs-on: macos-latest
    timeout-minutes: 60

    steps:
      # ─── 1. Attiva il VNC nativo di Apple ────────────────────────────────
      - name: Enable Apple Remote Desktop
        run: |
          # Attiviamo il servizio di condivisione schermo nativo di macOS
          sudo /System/Library/CoreServices/RemoteManagement/ARDAgent.app/Contents/Resources/kickstart -activate -configure -access -on -restart -agent -privs -all
          
          # Impostiamo la password "Simona26" per il VNC nativo
          sudo /System/Library/CoreServices/RemoteManagement/ARDAgent.app/Contents/Resources/kickstart -configure -clientopts -setvncpasswd -vncpasswd Simona26
          echo "✅ Screen Sharing Apple attivo sulla porta standard 5900!"

      # ─── 2. Apri il tunnel con Serveo (Gratis, No Carta, No Telefono) ────
      - name: Start Free Serveo Tunnel
        run: |
          # Usiamo l'SSH nativo del Mac per creare un tunnel verso il server pubblico gratuito Serveo
          # Questo assegnerà una porta tcp remota per collegarti
          nohup ssh -o StrictHostKeyChecking=no -R 0:localhost:5900 serveo.net </dev/null >/tmp/serveo.log 2>&1 &
          sleep 10

      # ─── 3. Estrai i dati di connessione dai log ──────────────────────────
      - name: Get Connection Link
        run: |
          cat /tmp/serveo.log
          # Estraiamo la porta assegnata da Serveo
          PORT=$(grep -oE "forwarded port [0-9]+" /tmp/serveo.log | grep -oE "[0-9]+")
          
          echo "╔══════════════════════════════════════════════════════════════╗"
          echo "║       🍏 IL TUO VERO MAC OS IN CLOUD È PRONTO!               ║"
          echo "╠══════════════════════════════════════════════════════════════╣"
          echo "║                                                              ║"
          echo "║  Usa una qualsiasi app di VNC (es. RealVNC Viewer)           ║"
          echo "║                                                              ║"
          echo "║  👉 INDIRIZZO:  serveo.net:$PORT                             ║"
          echo "║  👉 PASSWORD:   Simona26                                     ║"
          echo "║                                                              ║"
          echo "╚══════════════════════════════════════════════════════════════╝"

      # ─── 4. Mantieni vivo il Mac ─────────────────────────────────────────
      - name: Keep Alive
        run: sleep 3600
