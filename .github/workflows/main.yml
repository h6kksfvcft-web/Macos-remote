name: macOS Sequoia Desktop con AnyDesk

on:
  workflow_dispatch:

jobs:
  macos-anydesk:
    runs-on: macos-15  # macOS Sequoia (Apple Silicon) [citation:3][citation:9]
    timeout-minutes: 360  # 6 ore massimo

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Imposta password VNC
        run: |
          # Abilita VNC nativo macOS con password
          sudo /System/Library/CoreServices/RemoteManagement/ARDAgent.app/Contents/Resources/kickstart \
            -activate -configure -access -on \
            -users admin -privs -all \
            -restart -agent -menu
          
          # Imposta password VNC
          sudo dscl . -passwd /Users/admin "${{ secrets.VNC_PASSWORD }}"

      - name: Scarica e installa AnyDesk
        run: |
          # Scarica AnyDesk per macOS
          curl -L -o AnyDesk.dmg "https://download.anydesk.com/mac/AnyDesk.dmg"
          
          # Monta il DMG e installa
          sudo hdiutil attach AnyDesk.dmg
          sudo cp -R /Volumes/AnyDesk/AnyDesk.app /Applications/
          sudo hdiutil detach /Volumes/AnyDesk
          
          # Imposta permessi
          sudo xattr -d com.apple.quarantine /Applications/AnyDesk.app

      - name: Avvia AnyDesk
        run: |
          # Avvia AnyDesk in background
          open /Applications/AnyDesk.app &
          
          # Aspetta l'avvio
          sleep 10
          
          # Ottieni l'ID AnyDesk
          ANYDESK_ID=$(defaults read ~/Library/Preferences/com.philandro.anydesk.plist "AdDisplayID" 2>/dev/null || echo "N/A")
          
          echo "========================================="
          echo "✅ macOS Sequoia pronto!"
          echo "========================================="
          echo "🔑 AnyDesk ID: $ANYDESK_ID"
          echo "🔐 Password VNC: ${{ secrets.VNC_PASSWORD }}"
          echo "⏱️  Durata: 6 ore"
          echo "========================================="
          
          # Mantieni attivo il workflow
          sleep 21600

      - name: Keep alive
        run: |
          while true; do
            echo "🔄 Desktop attivo - $(date '+%Y-%m-%d %H:%M:%S')"
            echo "📊 Processi:"
            ps aux | grep -E "AnyDesk|ARDAgent" | grep -v grep
            sleep 300
          done
