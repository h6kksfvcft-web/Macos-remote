name: Real macOS Cloud (Full OS)

on:
  workflow_dispatch:
    inputs:
      session_duration:
        description: "Durata sessione in minuti (max 360)"
        required: false
        default: "60"
        type: string
      vnc_password:
        description: "Password VNC (lascia vuoto per auto-generata)"
        required: false
        default: ""
        type: string

jobs:
  macos-desktop:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      # ─── 1. Installa i componenti di virtualizzazione e noVNC ───────────────
      - name: Install QEMU, KVM and noVNC
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          sudo apt-get update
          # Installiamo QEMU e KVM per far girare macOS alla massima velocità hardware
          sudo apt-get install -y qemu-system-x86 qemu-utils novnc websockify curl git
          
      # ─── 2. Scarica l'immagine ufficiale del vero macOS ─────────────────────
      - name: Download Real macOS Image
        run: |
          mkdir -p /tmp/macos
          cd /tmp/macos
          # Scarichiamo un'immagine pronta e ottimizzata di macOS per QEMU/KVM
          curl -L -o macos.qcow2 "https://storage.googleapis.com/bitlux-vms/macos-catalina.qcow2" || \
          curl -L -o macos.qcow2 "https://github.com/kholia/OSX-KVM/releases/download/v1.0/macOS-Catalina.qcow2"
          
      # ─── 3. Avvia il vero macOS dentro l'emulatore ──────────────────────────
      - name: Start macOS Virtual Machine
        run: |
          # Generiamo la password per l'accesso
          if [ -n "${{ github.event.inputs.vnc_password }}" ]; then
            VNC_PASS="${{ github.event.inputs.vnc_password }}"
          else
            VNC_PASS="$(openssl rand -hex 4)"
          fi
          echo "VNC_PASS=$VNC_PASS" >> "$GITHUB_ENV"
          
          # Creiamo il file con la password per il server VNC di QEMU
          echo "$VNC_PASS" > /tmp/vnc_pass.txt
          
          # Avviamo il vero macOS assegnandogli la RAM e i core della macchina GitHub
          nohup qemu-system-x86_64 \
            -enable-kvm \
            -m 6G \
            -smp 4 \
            -cpu Penryn,kvm=on,vendor=GenuineIntel,+invtsc,vmware-cpuid-freq=on \
            -machine q35 \
            -device isa-applesmc,osk="ourhardworkbythesewordsguardedpleasedontsteal(c)AppleComputerInc" \
            -drive file=/tmp/macos/macos.qcow2,if=virtio,format=qcow2 \
            -vnc 127.0.0.1:0,password=on \
            -monitor stdio </dev/null >/tmp/qemu.log 2>&1 &
          
          sleep 5
          # Applichiamo la password al server VNC di QEMU
          echo "change vnc password $VNC_PASS" | qemu-system-x86_64 -monitor stdio
          sleep 5

      # ─── 4. Avvia l'interfaccia Web noVNC ───────────────────────────────────
      - name: Start noVNC Proxy
        run: |
          sudo ln -sf /usr/share/novnc/vnc.html /usr/share/novnc/index.html
          # Colleghiamo websockify sulla porta 5900 di QEMU (dove gira macOS)
          nohup websockify --web=/usr/share/novnc/ 6080 127.0.0.1:5900 </dev/null >/tmp/novnc.log 2>&1 &
          sleep 5
          echo "✅ noVNC per macOS attivato!"

      # ─── 5. Avvia il Tunnel Cloudflare ──────────────────────────────────────
      - name: Start Cloudflare Tunnel
        run: |
          curl -L --output /tmp/cloudflared https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64
          chmod +x /tmp/cloudflared
          
          nohup /tmp/cloudflared tunnel --url http://127.0.0.1:6080 </dev/null >/tmp/cloudflare.log 2>&1 &
          
          echo "Attendo URL pubblico da Cloudflare..."
          for i in $(seq 1 30); do
            sleep 3
            URL=$(grep -oE 'https://[a-zA-Z0-9.-]+\.trycloudflare\.com' /tmp/cloudflare.log | head -1)
            if [ -n "$URL" ]; then
              echo "TUNNEL_URL=$URL" >> "$GITHUB_ENV"
              echo "✅ Tunnel Cloudflare collegato a macOS!"
              break
            fi
          done
          if [ -z "$URL" ]; then
            cat /tmp/cloudflare.log
            exit 1
          fi

      # ─── 6. Mostra il link per connetterti ──────────────────────────────────
      - name: Display connection info
        run: |
          SESSION_DURATION="${{ github.event.inputs.session_duration }}"
          END_TIME=$(python3 -c "import datetime; print((datetime.datetime.utcnow() + datetime.timedelta(minutes=$SESSION_DURATION)).strftime('%H:%M UTC'))")

          echo ""
          echo "╔══════════════════════════════════════════════════════════════╗"
          echo "║       🍏 IL TUO VERO MAC OS CLOUD È PRONTO!                  ║"
          echo "╠══════════════════════════════════════════════════════════════╣"
          echo "║                                                              ║"
          echo "║  👉 ${TUNNEL_URL}/index.html?autoconnect=true&password=${VNC_PASS}"
          echo "║                                                              ║"
          printf "║  🔑 Password VNC :  %-41s║\n" "$VNC_PASS"
          printf "║  ⏱️  Attivo fino  :  %-41s║\n" "$END_TIME"
          echo "╚══════════════════════════════════════════════════════════════╝"
          echo ""

      # ─── 7. Mantieni viva la sessione ───────────────────────────────────────
      - name: Keep session alive
        run: |
          SESSION_DURATION="${{ github.event.inputs.session_duration }}"
          SLEEP_SECONDS=$(( SESSION_DURATION * 60 ))
          sleep $SLEEP_SECONDS
