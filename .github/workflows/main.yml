name: Linux Desktop Cloud (No Hardware Needed)

on:
  workflow_dispatch:
    inputs:
      session_duration:
        description: "Durata sessione in minuti (max 360)"
        required: false
        default: "60"
        type: string
      vnc_password:
        description: "Password VNC (lascia vuoto per auto-generata)"
        required: false
        default: ""
        type: string

jobs:
  remote-desktop:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      # ─── 1. Installa l'ambiente desktop (Linux Silenzioso) ──────────────────
      - name: Install Desktop Environment and noVNC
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          sudo apt-get update
          # Installazione super leggera e senza domande interattive
          sudo apt-get install -y --no-install-recommends xfce4 xfce4-session xvfb x11vnc python3 git
          
          # Scarica noVNC
          rm -rf /tmp/noVNC
          git clone --depth 1 https://github.com/novnc/noVNC.git /tmp/noVNC
          git clone --depth 1 https://github.com/novnc/websockify /tmp/noVNC/utils/websockify

      # ─── 2. Avvia lo schermo virtuale e il Desktop ──────────────────────────
      - name: Start Virtual Screen and XFCE
        run: |
          Xvfb :1 -screen 0 1280x720x24 &
          sleep 3
          DISPLAY=:1 startxfce4 &

      # ─── 3. Avvia il Server VNC con Password ────────────────────────────────
      - name: Start VNC Server
        run: |
          if [ -n "${{ github.event.inputs.vnc_password }}" ]; then
            VNC_PASS="${{ github.event.inputs.vnc_password }}"
          else
            VNC_PASS="$(openssl rand -hex 4)"
          fi
          echo "VNC_PASS=$VNC_PASS" >> "$GITHUB_ENV"

          nohup x11vnc -display :1 -passwd "$VNC_PASS" -forever -shared -rfbport 5900 > /tmp/x11vnc.log 2>&1 &
          sleep 3

      # ─── 4. Avvia noVNC ─────────────────────────────────────────────────────
      - name: Start noVNC
        run: |
          nohup python3 /tmp/noVNC/utils/novnc_proxy --vnc localhost:5900 --listen 6080 > /tmp/novnc.log 2>&1 &
          sleep 3

      # ─── 5. Tunnel localhost.run ─────────────────────────────────────────────
      - name: Start tunnel
        run: |
          mkdir -p ~/.ssh
          ssh-keygen -t ed25519 -f /tmp/tunnel_key -N "" -q
          nohup ssh -i /tmp/tunnel_key -o StrictHostKeyChecking=no -o ServerAliveInterval=30 -R 80:localhost:6080 nokey@localhost.run > /tmp/tunnel.log 2>&1 &
          
          echo "Attendo URL tunnel..."
          for i in $(seq 1 30); do
            sleep 2
            URL=$(grep -oE 'https://[a-zA-Z0-9.-]+\.lhr\.life' /tmp/tunnel.log | head -1)
            if [ -n "$URL" ]; then
              echo "TUNNEL_URL=$URL" >> "$GITHUB_ENV"
              break
            fi
          done

      # ─── 6. Mostra il link per connetterti ──────────────────────────────────
      - name: Display connection info
        run: |
          SESSION_DURATION="${{ github.event.inputs.session_duration }}"
          END_TIME=$(python3 -c "import datetime; print((datetime.datetime.utcnow() + datetime.timedelta(minutes=$SESSION_DURATION)).strftime('%H:%M UTC'))")

          echo ""
          echo "╔══════════════════════════════════════════════════════════════╗"
          echo "║       🖥️  IL TUO DESKTOP CLOUD È PRONTO!                      ║"
          echo "╠══════════════════════════════════════════════════════════════╣"
          echo "║                                                              ║"
          echo "║  👉 ${TUNNEL_URL}/vnc.html?autoconnect=true&password=${VNC_PASS}"
          echo "║                                                              ║"
          printf "║  🔑 Password VNC :  %-41s║\n" "$VNC_PASS"
          printf "║  ⏱️  Attivo fino  :  %-41s║\n" "$END_TIME"
          echo "╚══════════════════════════════════════════════════════════════╝"
          echo ""

      # ─── 7. Mantieni vivo il flusso ─────────────────────────────────────────
      - name: Keep session alive
        run: |
          SESSION_DURATION="${{ github.event.inputs.session_duration }}"
          SLEEP_SECONDS=$(( SESSION_DURATION * 60 ))
          sleep $SLEEP_SECONDS
