name: GUI macOS 26 Senza Secret

on: 
  workflow_dispatch:

jobs:
  interfaccia-grafica:
    runs-on: macos-26

    steps:
      - name: Checkout del codice
        uses: actions/checkout@v4

      - name: Configura Schermo con Password Casuale
        run: |
          DYNAMIC_PASS=$(openssl rand -base64 9 | tr -dc 'a-zA-Z0-9')
          echo "=================================================="
          echo "LA TUA PASSWORD DI ACCESSO È: $DYNAMIC_PASS"
          echo "=================================================="
          
          echo -e "$DYNAMIC_PASS\n$DYNAMIC_PASS" | sudo passwd runner
          
          sudo /System/Library/CoreServices/RemoteManagement/ARDAgent.app/Contents/Resources/kickstart \
            -activate -configure -access -on \
            -grantprivs -all \
            -restart -agent

      # Alternativa ultra-rapida a tmate che non usa Homebrew
      - name: Avvia il Tunnel per la GUI
        uses: csexton/debugger-action@v3
