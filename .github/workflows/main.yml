Name: Pure Native macOS Cloud

on:
  workflow_dispatch:
    inputs:
      session_duration:
        description: "Durata in minuti (Attenzione: consuma minuti x10)"
        required: false
        default: "30"
        type: string
      vnc_password:
        description: "Password d'accesso"
        required: false
        default: "SimoneLia2026"
        type: string

jobs:
  native-apple:
    runs-on: macos-latest
    timeout-minutes: 60

    steps:
      # ─── 1. Configura la password in modo compatibile con macOS moderno ───
      - name: Configure macOS User Password
        run: |
          sudo dscl . -passwd /Users/$USER "${{ github.event.inputs.vnc_password }}"
          echo "VNC_PASS=${{ github.event.inputs.vnc_password }}" >> "$GITHUB_ENV"

      # ─── 2. Attiva la Condivisione Schermo Nativa (Senza il comando 'activate') ─
      - name: Start Apple Screen Sharing Server
        run: |
          # Carichiamo il servizio usando la sintassi legacy 'load' che è supportata ovunque
          sudo launchctl load -w /System/Library/LaunchDaemons/com.apple.screensharing.plist 2>/dev/null || true
          
          # Lanciamo il kickstart nativo per configurare i permessi e la password di VNC
          sudo /System/Library/CoreServices/RemoteManagement/ARDAgent.app/Contents/Resources/kickstart \
            -activate -configure -access -on \
            -clientopts -setvncpasswd -vncpasswd ${{ github.event.inputs.vnc_password }} \
            -restart -agent -privs -all
          echo "✅ Server grafici Apple sbloccati!"

      # ─── 3. Installa gli strumenti di rete ────────────────────────────────
      - name: Install Network Tools on macOS
        run: |
          brew install ngrok python
          pip3 install websockify

      # ─── 4. Avvia websockify e il Tunnel Ngrok ────────────────────────────
      - name: Connect Ngrok Tunnel
        run: |
          nohup websockify 6080 127.0.0.1:5900 </dev/null >/tmp/websockify.log 2>&1 &
          sleep 3
          
          # ⚠️ Verifica che questo token sia valido nel tuo pannello Ngrok
          ngrok config add-authtoken "cr_3FIY7tk5cyBNpguY03YAleOod2W"
          
          nohup ngrok http 6080 </dev/null >/tmp/ngrok.log 2>&1 &
          sleep 8
          
          URL=$(curl -s http://localhost:4040/api/tunnels | python3 -c "
import sys, json
try:
    print(json.load(sys.stdin)['tunnels'][0]['public_url'])
except Exception:
    print('ERROR')
" 2>/dev/null)

          if [ "$URL" = "ERROR" ] || [ -z "$URL" ]; then
            echo "❌ Errore: Ngrok non è riuscito a creare il tunnel. Controlla il tuo AuthToken!"
            cat /tmp/ngrok.log
            exit 1
          fi

          CLEAN_URL=$(echo "$URL" | sed 's/http:\/\//https:\/\//g')
          echo "TUNNEL_URL=$CLEAN_URL" >> "$GITHUB_ENV"
          echo "✅ Tunnel Ngrok agganciato al Mac!"

      # ─── 5. Scarica l'interfaccia web noVNC ───────────────────────────────
      - name: Setup Web Interface View
        run: |
          git clone --depth 1 https://github.com/novnc/noVNC.git /tmp/noVNC
          cp /tmp/noVNC/vnc.html /tmp/noVNC/index.html
          pkill -f websockify || true
          nohup websockify --web=/tmp/noVNC/ 6080 127.0.0.1:5900 </dev/null >/tmp/websockify.log 2>&1 &
          sleep 2

      # ─── 6. Mostra il link di connessione ─────────────────────────────────
      - name: Display Connection Link
        run: |
          echo ""
          echo "╔══════════════════════════════════════════════════════════════╗"
          echo "║       🍏 IL TUO VERO MAC OS NATIVO È IN LINEA!               ║"
          echo "╠══════════════════════════════════════════════════════════════╣"
          echo "║                                                              ║"
          echo "║  👉 ${TUNNEL_URL}/index.html?autoconnect=true&password=${VNC_PASS}"
          echo "║                                                              ║"
          echo "║  🔑 Password VNC :  ${VNC_PASS}                              "
          echo "╚══════════════════════════════════════════════════════════════╝"
          echo ""

      # ─── 7. Mantieni attiva la sessione ───────────────────────────────────
      - name: Keep macOS alive
        run: |
          SESSION_DURATION="${{ github.event.inputs.session_duration }}"
          SLEEP_SECONDS=$(( SESSION_DURATION * 60 ))
          sleep $SLEEP_SECONDS
