name: Pure Native macOS Cloud

on:
  workflow_dispatch:
    inputs:
      session_duration:
        description: "Durata in minuti"
        required: false
        default: "30"
        type: string
      vnc_password:
        description: "Password d'accesso"
        required: false
        default: "SimoneLia2026"
        type: string

jobs:
  native-apple:
    runs-on: macos-latest
    timeout-minutes: 60

    steps:
      # ─── 1. Installa gli strumenti di rete e noVNC ────────────────────────
      - name: Install Network Tools and Dependencies
        run: |
          brew install ngrok
          pip3 install websockify --break-system-packages

      # ─── 2. Attiva lo Screen Sharing Nativo di macOS Apple ────────────────
      - name: Enable Native macOS Screen Sharing
        run: |
          # Attiva il server VNC nativo di Apple con i permessi di amministrazione corretti
          sudo /System/Library/CoreServices/RemoteManagement/ARDAgent.app/Contents/Resources/kickstart \
            -activate -configure -access -on \
            -clientopts -setvncpasswd -vncpasswd "${{ github.event.inputs.vnc_password }}" \
            -restart -agent -privs -all
          
          echo "✅ Server di Screen Sharing ufficiale macOS attivato sulla porta 5900!"

      # ─── 3. Configura l'interfaccia noVNC ─────────────────────────────────
      - name: Setup Web Interface View
        run: |
          git clone --depth 1 https://github.com/novnc/noVNC.git /tmp/noVNC
          cp /tmp/noVNC/vnc.html /tmp/noVNC/index.html
          
          # Collega websockify (porta 6080) al server nativo Apple (porta 5900)
          nohup websockify --web=/tmp/noVNC/ 6080 127.0.0.1:5900 </dev/null >/tmp/websockify.log 2>&1 &
          sleep 3

      # ─── 4. Connetti il Tunnel Ngrok ──────────────────────────────────────
      - name: Connect Ngrok Tunnel
        run: |
          # Aggiunge il token di autenticazione Ngrok
          ngrok config add-authtoken "3EoMAQM9GPofB8ve0Ur2rgD5K8t_2tqfrr56vyM8QNhUNiELX"
          
          # Avvia il tunnel sulla porta dell'interfaccia web (6080)
          nohup ngrok http 6080 </dev/null >/tmp/ngrok.log 2>&1 &
          sleep 12
          
          # Estrae l'URL pubblico generato da Ngrok
          URL=$(curl -s http://localhost:4040/api/tunnels | python3 -c "import sys, json; print(json.load(sys.stdin)['tunnels'][0]['public_url'])" 2>/dev/null || echo "ERROR")
          
          if [ "$URL" = "ERROR" ] || [ -z "$URL" ]; then
            echo "❌ Errore durante il recupero del tunnel Ngrok. Controlla i log:"
            cat /tmp/ngrok.log
            exit 1
          fi
          
          # Converte l'URL in HTTPS per la compatibilità con i browser moderni
          CLEAN_URL=$(echo "$URL" | sed 's/http:\/\//https:\/\//g')
          echo "TUNNEL_URL=$CLEAN_URL" >> "$GITHUB_ENV"
          echo "VNC_PASS=${{ github.event.inputs.vnc_password }}" >> "$GITHUB_ENV"

      # ─── 5. Mostra il link di connessione finale ──────────────────────────
      - name: Display Connection Link
        run: |
          echo "╔══════════════════════════════════════════════════════════════╗"
          echo "║       🍏 IL TUO AMBIENTE DI TEST MAC OS È IN LINEA!          ║"
          echo "╠══════════════════════════════════════════════════════════════╣"
          echo "║                                                              ║"
          echo "║  👉 ${TUNNEL_URL}/index.html?autoconnect=true&password=${VNC_PASS}"
          echo "║                                                              ║"
          echo "╚══════════════════════════════════════════════════════════════╝"

      # ─── 6. Mantieni attiva la sessione per il tempo richiesto ───────────
      - name: Keep macOS alive
        run: |
          SESSION_DURATION="${{ github.event.inputs.session_duration }}"
          SLEEP_SECONDS=$(( SESSION_DURATION * 60 ))
          echo "⏳ Il sistema rimarrà attivo per $SESSION_DURATION minuti ($SLEEP_SECONDS secondi)..."
          sleep $SLEEP_SECONDS
