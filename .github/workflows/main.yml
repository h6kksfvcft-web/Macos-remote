name: GUI macOS 26 per iPhone Definitivo

on: 
  workflow_dispatch: # Avvio manuale con un clic da GitHub Actions

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  gui-mac:
    runs-on: macos-26

    steps:
      # 1. Clona il tuo repository sul server
      - name: Checkout del codice
        uses: actions/checkout@v4.2.2

      # 2. Configura lo schermo virtuale e imposta la password d'accesso nativa
      - name: Configura Password di Accesso
        run: |
          DYNAMIC_PASS=$(openssl rand -base64 9 | tr -dc 'a-zA-Z0-9')
          echo "=================================================="
          echo "LA TUA PASSWORD DI ACCESSO GRAFICO È: $DYNAMIC_PASS"
          echo "=================================================="
          
          # Imposta la chiave d'accesso per il servizio Condivisione Schermo Apple
          sudo defaults write /Library/Preferences/com.apple.VNCSettings.txt Password -string "$DYNAMIC_PASS"
          
          # Forza l'attivazione immediata del server grafico nativo del Mac
          sudo launchctl load -w /System/Library/LaunchDaemons/com.apple.screensharing.plist 2>/dev/null || true

      # 3. Crea il tunnel remoto tramite comandi di sistema stabili
      - name: Avvia il Tunnel per iPhone
        run: |
          echo "Generazione chiavi SSH di sistema..."
          ssh-keygen -t rsa -f ~/.ssh/id_rsa -q -N ""
          
          # Genera un nome unico casuale per l'indirizzo internet del tuo Mac
          TUNNEL_NAME="macgui-$(openssl rand -hex 4)"
          
          echo "=================================================="
          echo "INDIRIZZO DA INSERIRE NELL'APP VNC DEL TUO IPHONE:"
          echo "${TUNNEL_NAME}.serveo.net"
          echo "=================================================="
          
          # Avvia il tunnel inoltrando la porta video 5900 del Mac sul server pubblico
          ssh -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -R ${TUNNEL_NAME}:5900:localhost:5900 serveo.net
