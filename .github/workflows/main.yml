name: Pure Native macOS Cloud

on:
  workflow_dispatch:
    inputs:
      session_duration:
        description: "Durata in minuti (Attenzione: consuma minuti x10)"
        required: false
        default: "30"
        type: string
      vnc_password:
        description: "Password d'accesso"
        required: false
        default: "SimoneLia2026"
        type: string

jobs:
  native-apple:
    # 🍏 Diciamo a GitHub di darci un VERO computer Apple fisico
    runs-on: macos-13
    timeout-minutes: 60

    steps:
      # ─── 1. Configura l'utente e la password sul Mac di GitHub ──────────────
      - name: Configure macOS User Password
        run: |
          # Impostiamo la password per l'utente corrente del Mac (runner)
          echo "${{ github.event.inputs.vnc_password }}" | sudo passwd -u $USER
          echo "VNC_PASS=${{ github.event.inputs.vnc_password }}" >> "$GITHUB_ENV"

      # ─── 2. Attiva la Condivisione Schermo Nativa di Apple (Screen Sharing) ─
      - name: Start Apple Screen Sharing Server
        run: |
          # Forza l'attivazione del server grafico integrato di macOS
          sudo launchctl activate system/com.apple.screensharing
          sudo /System/Library/CoreServices/RemoteManagement/ARDAgent.app/Contents/Resources/kickstart \
            -activate -configure -access -on \
            -clientopts -setvncpasswd -vncpasswd ${{ github.event.inputs.vnc_password }} \
            -restart -agent -privs -all
          echo "✅ Server grafici Apple sbloccati!"

      # ─── 3. Installa Node, Websockify e Ngrok tramite Homebrew (il gestore Mac) ───
      - name: Install Network Tools on macOS
        run: |
          brew install ngrok python
          # Installiamo websockify tramite python del Mac per convertire il segnale per il browser
          pip3 install websockify

      # ─── 4. Avvia websockify e il Tunnel Ngrok Autenticato ──────────────────
      - name: Connect Ngrok Tunnel
        run: |
          # Convertiamo la porta 5900 del Mac (VNC nativo Apple) sulla porta web 6080
          nohup websockify 6080 127.0.0.1:5900 </dev/null >/tmp/websockify.log 2>&1 &
          sleep 3
          
          # ⚠️ Inserisci qui il tuo token o usa i GitHub Secrets per maggiore sicurezza
          ngrok config add-authtoken "cr_3FIY7tk5cyBNpguY03YAleOod2W"
          
          # Lanciamo il tunnel sulla porta web
          nohup ngrok http 6080 </dev/null >/tmp/ngrok.log 2>&1 &
          sleep 5
          
          # Recuperiamo l'URL pubblico generato da Ngrok
          URL=$(curl -s http://localhost:4040/api/tunnels | python3 -c "import sys, json; print(json.load(sys.stdin)['tunnels'][0]['public_url'])" 2>/dev/null)
          CLEAN_URL=$(echo "$URL" | sed 's/http:\/\//https:\/\//g')
          echo "TUNNEL_URL=$CLEAN_URL" >> "$GITHUB_ENV"
          echo "✅ Tunnel Ngrok agganciato al Mac!"

      # ─── 5. Scarica la pagina web di noVNC per farti vedere lo schermo ───────
      - name: Setup Web Interface View
        run: |
          git clone --depth 1 https://github.com/novnc/noVNC.git /tmp/noVNC
          cp /tmp/noVNC/vnc.html /tmp/noVNC/index.html
          # Spostiamo websockify a servire la cartella noVNC appena scaricata
          pkill -f websockify || true
          nohup websockify --web=/tmp/noVNC/ 6080 127.0.0.1:5900 </dev/null >/tmp/websockify.log 2>&1 &
          sleep 2

      # ─── 6. Sputa fuori il link finale per il tuo telefono ─────────────────
      - name: Display Connection Link
        run: |
          echo ""
          echo "╔══════════════════════════════════════════════════════════════╗"
          echo "║       🍏 IL TUO VERO MAC OS NATIVO È IN LINEA!               ║"
          echo "╠══════════════════════════════════════════════════════════════╣"
          echo "║                                                              ║"
          echo "║  👉 ${TUNNEL_URL}/index.html?autoconnect=true&password=${VNC_PASS}"
          echo "║                                                              ║"
          echo "║  🔑 Password VNC :  ${VNC_PASS}                              "
          echo "╚══════════════════════════════════════════════════════════════╝"
          echo ""

      # ─── 7. Tieni sveglio il Mac ────────────────────────────────────────────
      - name: Keep macOS alive
        run: |
          SESSION_DURATION="${{ github.event.inputs.session_duration }}"
          SLEEP_SECONDS=$(( SESSION_DURATION * 60 ))
          # ✅ Corretto il refuso della 's-' finale per permettere il corretto funzionamento del timer
          sleep $SLEEP_SECONDS

