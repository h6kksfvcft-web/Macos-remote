name: GUI macOS 26 per iPhone Definitivo

on: 
  workflow_dispatch: # Avvio manuale con un clic

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  gui-mac:
    runs-on: macos-26

    steps:
      - name: Checkout del codice
        uses: actions/checkout@v4.2.2

      # 1. Attiva lo schermo e imposta la password (Nativo Apple)
      - name: Configura Password di Accesso
        run: |
          DYNAMIC_PASS=$(openssl rand -base64 9 | tr -dc 'a-zA-Z0-9')
          echo "=================================================="
          echo "LA TUA PASSWORD DI ACCESSO GRAFICO È: $DYNAMIC_PASS"
          echo "=================================================="
          
          # Imposta la chiave d'accesso per il servizio Condivisione Schermo Apple
          sudo defaults write /Library/Preferences/com.apple.VNCSettings.txt Password -string "$DYNAMIC_PASS"
          
          # Forza l'attivazione immediata del server grafico del Mac
          sudo launchctl load -w /System/Library/LaunchDaemons/com.apple.screensharing.plist 2>/dev/null || true

      # 2. Crea il tunnel remoto indistruttibile con Telebit (Zero blocchi, zero contratti)
      - name: Avvia il Tunnel per iPhone
        run: |
          echo "Installazione del modulo di rete Telebit..."
          # Scarica ed esegue l'installatore ufficiale standalone per il Mac
          curl -s https://telebit.io | bash > /dev/null 2>&1 || true
          
          echo "Configurazione del link di inoltro TCP..."
          # Configura telebit per ascoltare la porta dello schermo VNC (5900)
          ~/telebit http 5900 > /tmp/telebit.log 2>&1 &
          sleep 8
          
          echo "=================================================="
          echo "INDIRIZZO DA INSERIRE NELL'APP VNC DEL TUO IPHONE:"
          # Estrae l'indirizzo pubblico assegnato gratuitamente (.telebit.io)
          grep -o '[a-z0-9]*\.telebit\.io' /tmp/telebit.log || echo "Generazione in corso, controlla l'output sotto..."
          echo "=================================================="
          
          # Stampa i dettagli completi sul terminale di GitHub
          cat /tmp/telebit.log
          echo "=================================================="
          
          # Mantiene il server online senza limiti di tempo
          while true; do
            sleep 10
          done
