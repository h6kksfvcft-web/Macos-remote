name: Interfaccia Grafica macOS 26 Funzionante

on: 
  workflow_dispatch: # Avvio manuale con un clic

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  gui-mac:
    runs-on: macos-26

    steps:
      - name: Checkout del codice
        uses: actions/checkout@v4.2.2

      # 1. Installa TigerVNC e l'interfaccia web noVNC
      - name: Installa Server Grafico
        run: |
          export HOMEBREW_NO_ENV_HINTS=1
          brew install tigervnc node --quiet
          npm install -g novnc --quiet

      # 2. Configura e avvia lo schermo usando i percorsi assoluti corretti (Risolve Errore 127)
      - name: Inizializza Ambiente Grafico
        run: |
          DYNAMIC_PASS=$(openssl rand -base64 9 | tr -dc 'a-zA-Z0-9')
          echo "=================================================="
          echo "LA TUA PASSWORD DI ACCESSO GRAFICO È: $DYNAMIC_PASS"
          echo "=================================================="
          
          # Crea la cartella di configurazione grafica
          mkdir -p ~/.vnc
          
          # Usa il percorso assoluto di TigerVNC per creare la password (Risolve Errore 127)
          echo "$DYNAMIC_PASS" | /opt/homebrew/opt/tigervnc/bin/vncpasswd -f > ~/.vnc/passwd
          chmod 600 ~/.vnc/passwd
          
          # Avvia lo schermo virtuale indipendente (Display :1)
          /opt/homebrew/opt/tigervnc/bin/vncserver :1 -geometry 1280x720 -depth 24 -rfbauth ~/.vnc/passwd
          
          # Converte lo schermo in una pagina web interattiva sulla porta 6080
          novnc --vnc localhost:5901 --listen 6080 &

      # 3. Crea il link web immediato ed evita la chiusura del server
      - name: Avvia il Link Web per la GUI
        run: |
          echo "Generazione del link di accesso visivo in corso..."
          # Scarica il gestore di tunnel rapido per la porta web grafica
          curl -sL https://equinox.io -o ngrok.zip
          unzip -q ngrok.zip
          
          # Avvia il tunnel sulla porta dell'interfaccia web
          ./ngrok http 6080 --log=stdout > /dev/null &
          sleep 5
          
          echo "=================================================="
          echo "CLICCA SUL LINK SOTTOSTANTE PER VEDERE IL MAC:"
          curl -s http://localhost:4040/api/tunnels | grep -o 'https://[^"]*ngrok-free.app' || echo "Riprova tra pochi secondi..."
          echo "=================================================="
          
          # Mantiene la macchina virtuale attiva per farti usare la grafica
          while true; do
            sleep 10
          done
