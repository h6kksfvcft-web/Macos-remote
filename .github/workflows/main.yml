name: Terminale macOS 26 Stabile

on: 
  workflow_dispatch: # Avvio manuale con un clic

env:
  ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: "true"

jobs:
  interfaccia-remota:
    runs-on: macos-26 # Gira nativamente su Apple Silicon ARM64

    steps:
      - name: Checkout del codice
        uses: actions/checkout@v4.2.2

      # Installa direttamente il gestore di tunnel ufficiale
      - name: Configura e Avvia Terminale Remoto
        run: |
          export HOMEBREW_NO_ENV_HINTS=1
          brew install tmate --quiet
          
          # Configura la chiave SSH temporanea richiesta per agganciare il server
          ssh-keygen -t rsa -f ~/.ssh/id_rsa -q -N ""
          
          # Inizializza la sessione remota tmate
          tmate -S /tmp/tmate.sock new-session -d
          tmate -S /tmp/tmate.sock wait tmate-ready
          
          echo "=================================================="
          echo "CLICCA SUL LINK SOTTOSTANTE PER ENTRARE NEL MAC:"
          tmate -S /tmp/tmate.sock display -p '#{tmate_web}'
          echo "=================================================="
          
          # Ciclo di controllo anti-chiusura: mantiene il runner attivo per te
          while [ -f /tmp/tmate.sock ]; do
            sleep 10
          done
