name: GUI macOS 26 Nativa ARM64

on: 
  workflow_dispatch: # Avvio manuale con un clic

jobs:
  interfaccia-grafica:
    runs-on: macos-26 # Esegue su Apple Silicon ARM64 di serie

    steps:
      - name: Checkout del codice
        uses: actions/checkout@v4

      # 1. Configura lo schermo e crea la password dinamica
      - name: Configura Schermo con Password Casuale
        run: |
          DYNAMIC_PASS=$(openssl rand -base64 9 | tr -dc 'a-zA-Z0-9')
          echo "=================================================="
          echo "LA TUA PASSWORD DI ACCESSO È: $DYNAMIC_PASS"
          echo "=================================================="
          
          # Cambia la password dell'utente "runner" del Mac
          echo -e "$DYNAMIC_PASS\n$DYNAMIC_PASS" | sudo passwd runner
          
          # Attiva la condivisione dello schermo ufficiale Apple
          sudo /System/Library/CoreServices/RemoteManagement/ARDAgent.app/Contents/Resources/kickstart \
            -activate -configure -access -on \
            -grantprivs -all \
            -restart -agent

      # 2. Avvia il tunnel scaricando tmate tramite Homebrew ma ignorando i warning di deprecazione
      - name: Installa e Avvia Tunnel Grafico
        run: |
          echo "Installazione di tmate in corso..."
          export HOMEBREW_NO_ENV_HINTS=1
          brew install tmate --quiet
          
          # Configura la chiave SSH necessaria per avviare la sessione
          ssh-keygen -t rsa -f ~/.ssh/id_rsa -q -N ""
          
          echo "Avvio della sessione del tunnel..."
          tmate -S /tmp/tmate.sock new-session -d
          tmate -S /tmp/tmate.sock wait tmate-ready
          
          echo "=================================================="
          echo "LINK PER CONNETTERTI IN INTERFACCIA GRAFICA:"
          tmate -S /tmp/tmate.sock display -p '#{tmate_web}'
          echo "=================================================="
          
          # Mantiene il Mac online per permetterti l'uso visivo
          while [ -f /tmp/tmate.sock ]; do sleep 5; done
