name: macOS Desktop (noVNC + localhost.run)

on:
  workflow_dispatch:
    inputs:
      session_duration:
        description: "Durata sessione in minuti (max 360)"
        required: false
        default: "60"
        type: string
      vnc_password:
        description: "Password VNC (lascia vuoto per auto-generata)"
        required: false
        default: ""
        type: string

jobs:
  remote-desktop:
    runs-on: macos-latest
    timeout-minutes: 360

    steps:
      # ─── 1. Imposta password VNC ─────────────────────────────────────────────
      - name: Set VNC password
        run: |
          if [ -n "${{ github.event.inputs.vnc_password }}" ]; then
            VNC_PASS="${{ github.event.inputs.vnc_password }}"
          else
            VNC_PASS="$(openssl rand -hex 4)"
          fi
          echo "VNC_PASS=$VNC_PASS" >> "$GITHUB_ENV"

          # Imposta password VNC tramite defaults macOS
          sudo defaults write /Library/Preferences/com.apple.RemoteManagement \
            VNCPassword -data "$(echo -n "$VNC_PASS" | xxd -p)"

      # ─── 2. Abilita Screen Sharing (VNC) di macOS ───────────────────────────
      - name: Enable macOS Screen Sharing
        run: |
          # Abilita ARD/VNC built-in di macOS
          sudo /System/Library/CoreServices/RemoteManagement/ARDAgent.app/Contents/Resources/kickstart \
            -activate \
            -configure -access -on \
            -configure -allowAccessFor -allUsers \
            -configure -restart -agent \
            -configure -privs -all \
            -configure -clientopts -setvnclegacy -vnclegacy yes \
            -configure -clientopts -setvncpw -vncpw "$VNC_PASS"

          sleep 3
          echo "✅ Screen Sharing abilitato sulla porta 5900"

      # ─── 3. Installa noVNC ───────────────────────────────────────────────────
      - name: Install and start noVNC
        run: |
          brew install novnc 2>/dev/null || true

          # Fallback: scarica noVNC direttamente
          if ! command -v novnc &>/dev/null; then
            git clone --depth 1 https://github.com/novnc/noVNC.git /tmp/noVNC
            git clone --depth 1 https://github.com/novnc/websockify /tmp/noVNC/utils/websockify
            NOVNC_CMD="python3 /tmp/noVNC/utils/novnc_proxy"
          else
            NOVNC_CMD="novnc"
          fi

          # Avvia noVNC su porta 6080 → bridge verso VNC su 5900
          nohup $NOVNC_CMD \
            --vnc localhost:5900 \
            --listen 6080 \
            > /tmp/novnc.log 2>&1 &

          sleep 5
          echo "✅ noVNC in ascolto su porta 6080"
          cat /tmp/novnc.log || true

      # ─── 4. Avvia tunnel pubblico con localhost.run ──────────────────────────
      - name: Start localhost.run tunnel
        run: |
          # Genera chiave SSH temporanea per localhost.run
          ssh-keygen -t ed25519 -f /tmp/tunnel_key -N "" -q

          # Avvia tunnel: porta 6080 (noVNC) → URL pubblico
          nohup ssh \
            -i /tmp/tunnel_key \
            -o StrictHostKeyChecking=no \
            -o ServerAliveInterval=30 \
            -o ServerAliveCountMax=10 \
            -R 80:localhost:6080 \
            nokey@localhost.run \
            > /tmp/tunnel.log 2>&1 &

          echo "Attendo URL tunnel..."
          for i in $(seq 1 30); do
            sleep 2
            URL=$(grep -oE 'https://[a-zA-Z0-9.-]+\.lhr\.life' /tmp/tunnel.log | head -1)
            if [ -n "$URL" ]; then
              echo "TUNNEL_URL=$URL" >> "$GITHUB_ENV"
              echo "✅ Tunnel attivo: $URL"
              break
            fi
            echo -n "."
          done

          echo ""
          echo "=== Tunnel log ==="
          cat /tmp/tunnel.log || true

      # ─── 5. Mostra credenziali ──────────────────────────────────────────────
      - name: Display connection info
        run: |
          SESSION_DURATION="${{ github.event.inputs.session_duration }}"
          END_TIME=$(date -v+"${SESSION_DURATION}M" "+%H:%M UTC")

          NOVNC_URL="${TUNNEL_URL}/vnc.html?autoconnect=true&password=${VNC_PASS}"

          echo ""
          echo "╔══════════════════════════════════════════════════════════════╗"
          echo "║       🖥️  macOS DESKTOP REMOTO PRONTO                        ║"
          echo "╠══════════════════════════════════════════════════════════════╣"
          printf "║  🌐 URL Desktop  :  %-41s║\n" "$TUNNEL_URL/vnc.html"
          printf "║  🔑 Password VNC :  %-41s║\n" "$VNC_PASS"
          printf "║  ⚡ URL diretto  :  %-41s║\n" "(vedi sotto)"
          printf "║  ⏱️  Attivo fino  :  %-41s║\n" "$END_TIME"
          echo "╠══════════════════════════════════════════════════════════════╣"
          echo "║  Come connettersi:                                           ║"
          echo "║  Apri questo link nel browser:                               ║"
          echo "║  $NOVNC_URL"
          echo "╚══════════════════════════════════════════════════════════════╝"
          echo ""
          echo "::add-mask::$VNC_PASS"

      # ─── 6. Mantieni la sessione viva ───────────────────────────────────────
      - name: Keep session alive
        run: |
          SESSION_DURATION="${{ github.event.inputs.session_duration }}"
          SLEEP_SECONDS=$(( SESSION_DURATION * 60 ))
          ELAPSED=0

          echo "Sessione attiva per $SESSION_DURATION minuti."
          echo "Per chiudere prima: annulla il workflow da GitHub Actions."

          while [ $ELAPSED -lt $SLEEP_SECONDS ]; do
            NEXT=$(( 300 < (SLEEP_SECONDS - ELAPSED) ? 300 : (SLEEP_SECONDS - ELAPSED) ))
            sleep $NEXT
            ELAPSED=$(( ELAPSED + NEXT ))
            REMAINING=$(( (SLEEP_SECONDS - ELAPSED) / 60 ))
            [ $REMAINING -gt 0 ] && echo "⏳ $REMAINING minuti rimanenti"

            # Watchdog tunnel
            pgrep -f "localhost.run" || nohup ssh \
              -i /tmp/tunnel_key \
              -o StrictHostKeyChecking=no \
              -o ServerAliveInterval=30 \
              -R 80:localhost:6080 \
              nokey@localhost.run >> /tmp/tunnel.log 2>&1 &
          done

          echo "✅ Sessione terminata."
