name: Uncrashable Linux Desktop Cloud

on:
  workflow_dispatch:
    inputs:
      session_duration:
        description: "Durata sessione in minuti (max 360)"
        required: false
        default: "60"
        type: string
      vnc_password:
        description: "Password VNC (lascia vuoto per auto-generata)"
        required: false
        default: ""
        type: string

jobs:
  remote-desktop:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      # ─── 1. Installa l'ambiente desktop e noVNC nativo ───────────────────────
      - name: Install Desktop Environment and noVNC
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          sudo apt-get update
          # Installiamo direttamente novnc e websockify dai repository ufficiali Ubuntu
          sudo apt-get install -y --no-install-recommends xfce4 xfce4-session xvfb x11vnc novnc websockify dbus-x11 xinit curl
          
      # ─── 2. Avvia lo schermo virtuale e il Desktop ──────────────────────────
      - name: Start Virtual Screen and XFCE
        run: |
          Xvfb :1 -screen 0 1280x720x24 +extension GLX +render -noreset &
          sleep 3
          export DISPLAY=:1
          dbus-launch --exit-with-session startxfce4 &
          sleep 5

      # ─── 3. Avvia il Server VNC con Password ────────────────────────────────
      - name: Start VNC Server
        run: |
          if [ -n "${{ github.event.inputs.vnc_password }}" ]; then
            VNC_PASS="${{ github.event.inputs.vnc_password }}"
          else
            VNC_PASS="$(openssl rand -hex 4)"
          fi
          echo "VNC_PASS=$VNC_PASS" >> "$GITHUB_ENV"

          # Avvia x11vnc agganciato stabilmente allo schermo :1
          nohup x11vnc -display :1 -passwd "$VNC_PASS" -forever -shared -rfbport 5900 </dev/null >/tmp/x11vnc.log 2>&1 &
          sleep 3

      # ─── 4. Avvia il Proxy noVNC Nativo (Senza Crash) ────────────────────────
      - name: Start noVNC Proxy
        run: |
          # Usiamo l'eseguibile di sistema che reindirizza in modo stabile la porta 5900 sulla 6080
          nohup websockify --web /usr/share/novnc/ 6080 localhost:5900 </dev/null >/tmp/novnc.log 2>&1 &
          sleep 5
          echo "✅ noVNC Proxy di sistema attivato!"

      # ─── 5. Tunnel Stabile Cloudflare ───────────────────────────────────────
      - name: Start Cloudflare Tunnel
        run: |
          curl -L --output /tmp/cloudflared https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64
          chmod +x /tmp/cloudflared
          
          nohup /tmp/cloudflared tunnel --url http://localhost:6080 </dev/null >/tmp/cloudflare.log 2>&1 &
          
          echo "Attendo URL pubblico da Cloudflare..."
          for i in $(seq 1 30); do
            sleep 2
            URL=$(grep -oE 'https://[a-zA-Z0-9.-]+\.trycloudflare\.com' /tmp/cloudflare.log | head -1)
            if [ -n "$URL" ]; then
              echo "TUNNEL_URL=$URL" >> "$GITHUB_ENV"
              echo "✅ Tunnel Cloudflare attivo!"
              break
            fi
          done
          if [ -z "$URL" ]; then
            cat /tmp/cloudflare.log
            exit 1
          fi

      # ─── 6. Mostra il link per connetterti ──────────────────────────────────
      - name: Display connection info
        run: |
          SESSION_DURATION="${{ github.event.inputs.session_duration }}"
          END_TIME=$(python3 -c "import datetime; print((datetime.datetime.utcnow() + datetime.timedelta(minutes=$SESSION_DURATION)).strftime('%H:%M UTC'))")

          echo ""
          echo "╔══════════════════════════════════════════════════════════════╗"
          echo "║       🖥️  IL TUO DESKTOP CLOUD È FINALMENTE PRONTO!           ║"
          echo "╠══════════════════════════════════════════════════════════════╣"
          echo "║                                                              ║"
          echo "║  👉 ${TUNNEL_URL}/vnc.html?autoconnect=true&password=${VNC_PASS}"
          echo "║                                                              ║"
          printf "║  🔑 Password VNC :  %-41s║\n" "$VNC_PASS"
          printf "║  ⏱️  Attivo fino  :  %-41s║\n" "$END_TIME"
          echo "╚══════════════════════════════════════════════════════════════╝"
          echo ""

      # ─── 7. Mantieni viva la macchina virtuale ──────────────────────────────
      - name: Keep session alive
        run: |
          SESSION_DURATION="${{ github.event.inputs.session_duration }}"
          SLEEP_SECONDS=$(( SESSION_DURATION * 60 ))
          sleep $SLEEP_SECONDS
