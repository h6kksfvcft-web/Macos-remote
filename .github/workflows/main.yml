name: macOS VNC Desktop

on: workflow_dispatch

jobs:
  vnc:
    runs-on: macos-15
    timeout-minutes: 360

    steps:
      - name: Setup VNC
        run: |
          # Abilita Remote Management
          sudo /System/Library/CoreServices/RemoteManagement/ARDAgent.app/Contents/Resources/kickstart \
            -activate -configure -access -on -restart -agent -menu
          
          # Imposta password
          sudo defaults write /Library/Preferences/com.apple.RemoteManagement.plist VNCEnabled -bool TRUE
          echo "password123" > /tmp/vncpass
          sudo mv /tmp/vncpass /Library/Preferences/com.apple.RemoteManagement.password
          sudo chmod 600 /Library/Preferences/com.apple.RemoteManagement.password
          
          # Mostra IP
          IP=$(ifconfig | grep "inet " | grep -v 127.0.0.1 | awk '{print $2}' | head -1)
          
          echo "========================================="
          echo "✅ MACOS VNC PRONTO!"
          echo "========================================="
          echo "🔗 VNC: $IP:5900"
          echo "🔐 PASSWORD: password123"
          echo "⏱️  6 ORE"
          echo "========================================="
          echo ""
          echo "📌 USA CLIENT VNC (TigerVNC, RealVNC)"
          
          sleep 21600
