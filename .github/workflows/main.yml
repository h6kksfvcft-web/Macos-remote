name: Windows Remote Desktop Cloud

on:
  workflow_dispatch:
    inputs:
      session_duration:
        description: "Durata in minuti"
        required: false
        default: "60"
        type: string
      rdp_password:
        description: "Imposta la password d'accesso (Minimo 6 caratteri)"
        required: false
        default: "SimoneLia2026"
        type: string

jobs:
  windows-rdp:
    runs-on: windows-latest
    timeout-minutes: 65

    steps:
      # ─── 1. Attiva il Desktop Remoto in Windows e imposta la Password ────
      - name: Enable Windows Remote Desktop
        run: |
          # Abilitiamo le chiavi di registro per consentire le connessioni RDP
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -name "fDenyTSConnections" -Value 0
          Enable-NetFirewallRule -DisplayGroup "Remote Desktop"
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' -name "UserAuthentication" -Value 1
          
          # Cambiamo la password dell'utente 'runneradmin' con quella scelta da te
          $Password = ConvertTo-SecureString "${{ github.event.inputs.rdp_password }}" -AsPlainText -Force
          Set-LocalUser -Name "runneradmin" -Password $Password
          
          echo "✅ Windows Remote Desktop abilitato e password impostata!"

      # ─── 2. Avvia il Tunnel TCP Libero tramite Pinggy ─────────────────────
      - name: Start Free TCP Tunnel
        run: |
          # Avviamo il tunnel TCP sulla porta 3389 usando il client SSH nativo di Windows.
          # Accettiamo automaticamente le chiavi e salviamo l'output in un file di log.
          Start-Process ssh -ArgumentList "-o StrictHostKeyChecking=no -o UserKnownHostsFile=\\`$null -R 0:localhost:3389 tcp@pinggy.io v=1" -NoNewWindow -RedirectStandardOutput "C:\pinggy.log" -RedirectStandardError "C:\pinggy_err.log"
          
          echo "⏳ Tunnel TCP in fase di attivazione..."
          Start-Sleep -Seconds 12

      # ─── 3. Estrai l'indirizzo pubblico dai Log di Pinggy ─────────────────
      - name: Display Connection Details
        run: |
          if (Test-Path "C:\pinggy.log") {
              $LogContent = Get-Content "C:\pinggy.log" -Raw
              # Cerchiamo la stringa tcp:// generata da Pinggy
              if ($LogContent -match "tcp://([^ \r\n]+)") {
                  $CleanAddress = $Matches[1]
                  
                  Write-Host "╔══════════════════════════════════════════════════════════════╗" -ForegroundColor Green
                  Write-Host "║       🪟 IL TUO AMBIENTE DI TEST WINDOWS È IN LINEA!          ║" -ForegroundColor Green
                  Write-Host "╠══════════════════════════════════════════════════════════════╣" -ForegroundColor Green
                  Write-Host "║                                                              ║" -ForegroundColor Green
                  Write-Host "║  Usa l'app ufficiale 'Remote Desktop' (di Microsoft)         ║" -ForegroundColor Green
                  Write-Host "║                                                              ║" -ForegroundColor Green
                  Write-Host "║  👉 INDIRIZZO PC (IP:Porta): $CleanAddress" -ForegroundColor Yellow
                  Write-Host "║  👉 NOME UTENTE:             runneradmin" -ForegroundColor Yellow
                  Write-Host "║  👉 PASSWORD:                ${{ github.event.inputs.rdp_password }}" -ForegroundColor Yellow
                  Write-Host "║                                                              ║" -ForegroundColor Green
                  Write-Host "╚══════════════════════════════════════════════════════════════╝" -ForegroundColor Green
              } else {
                  Write-Host "❌ Impossibile trovare l'URL nel log di Pinggy. Contenuto:"
                  Get-Content "C:\pinggy.log"
                  Exit 1
              }
          } else {
              Write-Host "❌ Il file di log di Pinggy non è stato creato. Errore:"
              if (Test-Path "C:\pinggy_err.log") { Get-Content "C:\pinggy_err.log" }
              Exit 1
          }

      # ─── 4. Mantieni attiva la sessione ───────────────────────────────────
      - name: Keep Windows Alive
        run: |
          $Minutes = [int]"${{ github.event.inputs.session_duration }}"
          $Seconds = $Minutes * 60
          Write-Host "⏳ La macchina rimarrà attiva per $Minutes minuti..."
          Start-Sleep -Seconds $Seconds
