name: GUI macOS 26 Senza Secret

on: 
  workflow_dispatch: # Avvio manuale con un clic

jobs:
  interfaccia-grafica:
    runs-on: macos-26

    steps:
      - name: Checkout del codice
        uses: actions/checkout@v4

      # Genera una password casuale dinamica e configura lo schermo
      - name: Configura Schermo con Password Casuale
        run: |
          # Genera una stringa casuale di 12 caratteri
          DYNAMIC_PASS=$(openssl rand -base64 9 | tr -dc 'a-zA-Z0-9')
          echo "=================================================="
          echo "LA TUA PASSWORD VNC TEMPORANEA È: $DYNAMIC_PASS"
          echo "=================================================="
          
          # Salva la password nel sistema del Mac virtuale
          mkdir -p ~/.vnc
          echo "$DYNAMIC_PASS" | vncpasswd -f > ~/.vnc/passwd
          chmod 600 ~/.vnc/passwd
          
          # Attiva la condivisione dello schermo macOS ufficiale
          sudo /System/Library/CoreServices/RemoteManagement/ARDAgent.app/Contents/Resources/kickstart \
            -activate -configure -access -on \
            -clientopts -setvncpasswd -vncpasswd "$DYNAMIC_PASS" \
            -restart -agent -privs -all

      # Avvia il tunnel tmate per darti i link di accesso
      - name: Avvia il Tunnel per la GUI
        uses: mxschmitt/action-tmate@v3
