name: macOS Sequoia Desktop

on: workflow_dispatch

jobs:
  macos-desktop:
    runs-on: macos-15
    timeout-minutes: 360

    steps:
      - name: Abilita Remote Management
        run: |
          sudo /System/Library/CoreServices/RemoteManagement/ARDAgent.app/Contents/Resources/kickstart \
            -activate -configure -access -on -restart -agent -menu
          
          sudo /System/Library/CoreServices/RemoteManagement/ARDAgent.app/Contents/Resources/kickstart \
            -configure -allowAccessFor -allUsers -privs -all
          
          echo "✅ Remote Management attivato"

      - name: Scarica e installa TeamViewer
        run: |
          # Scarica TeamViewer
          curl -L -o TeamViewer.dmg "https://download.teamviewer.com/download/TeamViewer.dmg"
          
          # Monta il DMG
          sudo hdiutil attach TeamViewer.dmg -nobrowse
          
          # Trova il volume
          VOLUME_PATH=$(ls -d /Volumes/TeamViewer* 2>/dev/null | head -1)
          echo "Volume montato: $VOLUME_PATH"
          
          # Mostra il contenuto del volume
          ls -la "$VOLUME_PATH"
          
          # TeamViewer usa un installer, non l'app direttamente
          # Dobbiamo eseguire l'installer
          INSTALLER_PATH="$VOLUME_PATH/Install TeamViewer.app"
          
          if [ -d "$INSTALLER_PATH" ]; then
            echo "✅ Trovato installer, eseguo..."
            
            # Esegui l'installer
            open "$INSTALLER_PATH" &
            
            # Aspetta che l'installer finisca
            sleep 30
            
            # TeamViewer si installa in ~/Applications o /Applications
            # Cerchiamo l'app
            find /Applications -name "TeamViewer.app" -type d 2>/dev/null
            find ~/Applications -name "TeamViewer.app" -type d 2>/dev/null
          else
            echo "❌ Installer non trovato"
            exit 1
          fi
          
          # Smonta il DMG
          sudo hdiutil detach "$VOLUME_PATH"
          
          echo "✅ TeamViewer installato"

      - name: Trova e avvia TeamViewer
        run: |
          # Cerca TeamViewer in tutte le posizioni possibili
          TV_PATH=$(find /Applications -name "TeamViewer.app" -type d 2>/dev/null | head -1)
          
          if [ -z "$TV_PATH" ]; then
            TV_PATH=$(find ~/Applications -name "TeamViewer.app" -type d 2>/dev/null | head -1)
          fi
          
          if [ -z "$TV_PATH" ]; then
            # Cerca ovunque
            TV_PATH=$(find / -name "TeamViewer.app" -type d 2>/dev/null | grep -v "Trash" | head -1)
          fi
          
          if [ -n "$TV_PATH" ]; then
            echo "✅ Trovato TeamViewer: $TV_PATH"
            open "$TV_PATH" &
            echo "✅ TeamViewer avviato"
          else
            echo "❌ TeamViewer non trovato"
            echo "📌 Contenuto di /Applications:"
            ls -la /Applications
          fi
          
          sleep 15
          
          echo "========================================="
          echo "✅ macOS Sequoia pronto!"
          echo "========================================="
          echo "📌 TeamViewer è in esecuzione"
          echo "   ID: controlla nell'app"
          echo "⏱️  Durata: 6 ore"
          echo "========================================="
          
          sleep 21600

      - name: Keep alive
        run: |
          while true; do
            echo "🔄 Desktop attivo - $(date '+%Y-%m-%d %H:%M:%S')"
            echo "📊 Processi:"
            ps aux | grep -E "TeamViewer|ARDAgent" | grep -v grep | wc -l
            echo "📊 App in /Applications:"
            ls /Applications | grep -i teamviewer || echo "TeamViewer non trovato"
            sleep 300
          done
