name: Mac OS Istantaneo con Ngrok

on:
  workflow_dispatch:

jobs:
  macos-desktop:
    runs-on: macos-latest
    timeout-minutes: 60

    steps:
      # ─── 1. Attiva lo Screen Sharing nativo di Apple ─────────────────────
      - name: Enable Apple Remote Desktop
        run: |
          sudo /System/Library/CoreServices/RemoteManagement/ARDAgent.app/Contents/Resources/kickstart -activate -configure -access -on -restart -agent -privs -all
          sudo /System/Library/CoreServices/RemoteManagement/ARDAgent.app/Contents/Resources/kickstart -configure -clientopts -setvncpasswd -vncpasswd Simona26
          echo "✅ VNC Apple pronto sulla porta 5900!"

      # ─── 2. Installa Ngrok velocemente ───────────────────────────────────
      - name: Install Ngrok
        run: brew install ngrok

      # ─── 3. Avvia il tunnel TCP ultra-veloce con il tuo Token ────────────
      - name: Start Ngrok TCP Tunnel
        run: |
          ngrok config add-authtoken "3EoMAQM9GPofB8ve0Ur2rgD5K8t_2tqfrr56vyM8QNhUNiELX"
          # Apriamo un tunnel TCP diretto sulla porta 5900 (il VNC del Mac)
          nohup ngrok tcp 5900 </dev/null >/tmp/ngrok.log 2>&1 &
          sleep 5

      # ─── 4. Mostra i dati per l'app VNC Viewer ───────────────────────────
      - name: Get Connection Link
        run: |
          cat /tmp/ngrok.log
          # Estraiamo l'indirizzo TCP di Ngrok (es. tcp://0.tcp.ngrok.io:12345)
          RAW_URL=$(curl -s http://localhost:4040/api/tunnels | python3 -c "import sys, json; print(json.load(sys.stdin)['tunnels'][0]['public_url'])" 2>/dev/null || echo "ERROR")
          
          # Puliamo l'URL togliendo "tcp://" perché l'app vuole solo l'indirizzo pulito
          CLEAN_URL=$(echo "$RAW_URL" | sed 's/tcp:\/\///g')
          
          echo "╔══════════════════════════════════════════════════════════════╗"
          echo "║       🍏 IL TUO MAC REMOTO È ONLINE E VELOCISSIMO!           ║"
          echo "╠══════════════════════════════════════════════════════════════╣"
          echo "║                                                              ║"
          echo "║  Apri l'app VNC Viewer sul tuo iPhone e inserisci:           ║"
          echo "║                                                              ║"
          echo "║  👉 INDIRIZZO:  $CLEAN_URL                                   ║"
          echo "║  👉 PASSWORD:   Simona26                                     ║"
          echo "║                                                              ║"
          echo "╚══════════════════════════════════════════════════════════════╝"

      # ─── 5. Mantieni vivo il Mac ─────────────────────────────────────────
      - name: Keep Alive
        run: sleep 3600
