name: Pure Native macOS Cloud

on:
  workflow_dispatch:
    inputs:
      session_duration:
        description: "Durata in minuti"
        required: false
        default: "60"
        type: string
      vnc_password:
        description: "Password (Esattamente 8 caratteri)"
        required: false
        default: "Simona26"
        type: string

jobs:
  native-apple:
    runs-on: macos-latest
    timeout-minutes: 65

    steps:
      # ─── 1. Attiva lo Screen Sharing Ufficiale Apple ──────────────────────
      - name: Enable Native macOS Screen Sharing
        run: |
          sudo /usr/libexec/ApplicationFirewall/socketfilterfw --setglobalstate off
          
          # Configura la password legacy di 8 caratteri
          sudo /System/Library/CoreServices/RemoteManagement/ARDAgent.app/Contents/Resources/kickstart \
            -configure -clientopts -setvnclegacy yes -setvncpw "${{ github.event.inputs.vnc_password }}"
          
          # Abilita l'accesso completo per tutti gli utenti
          sudo /System/Library/CoreServices/RemoteManagement/ARDAgent.app/Contents/Resources/kickstart \
            -configure -access -on -privs -all -allowAccessFor -allUsers
          
          # Attiva il servizio
          sudo /System/Library/CoreServices/RemoteManagement/ARDAgent.app/Contents/Resources/kickstart \
            -activate -restart -agent
          
          echo "✅ Server Apple pronto sulla porta 5900!"

      # ─── 2. Apri il Tunnel TCP Libero tramite Pinggy ──────────────────────
      - name: Start Free TCP Tunnel
        run: |
          # Avviamo il tunnel TCP sulla porta 5900 accettando automaticamente i parametri di cifratura
          ssh -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -R 0:localhost:5900 tcp@pinggy.io "v=1" > /tmp/pinggy.log 2>&1 &
          sleep 12
          
          # Estraiamo l'URL TCP generato dal file di log
          cat /tmp/pinggy.log
          SERVER_ADDR=$(grep -oE "tcp://[^ ]+" /tmp/pinggy.log | head -n 1 | sed 's/tcp:\/\///')
          
          if [ -z "$SERVER_ADDR" ]; then
            echo "❌ Errore nella creazione del tunnel. Ecco il log completo:"
            cat /tmp/pinggy.log
            exit 1
          fi
          
          echo "TCP_URL=$SERVER_ADDR" >> "$GITHUB_ENV"

      # ─── 3. Mostra i dati per l'applicazione mobile ───────────────────────
      - name: Display Connection Details
        run: |
          echo "╔══════════════════════════════════════════════════════════════╗"
          echo "║       🍏 IL TUO AMBIENTE DI TEST MAC OS È IN LINEA!          ║"
          echo "╠══════════════════════════════════════════════════════════════╣"
          echo "║                                                              ║"
          echo "║  Scarica l'app 'VNC Viewer' dal tuo App Store su iPhone.     ║"
          echo "║  Crea una nuova connessione inserendo questi dati:           ║"
          echo "║                                                              ║"
          echo "║  👉 INDIRIZZO (Address): ${TCP_URL}"
          echo "║  👉 PASSWORD:            ${{ github.event.inputs.vnc_password }}"
          echo "║                                                              ║"
          echo "╚══════════════════════════════════════════════════════════════╝"

      # ─── 4. Mantieni attiva la sessione ───────────────────────────────────
      - name: Keep macOS alive
        run: |
          SESSION_DURATION="${{ github.event.inputs.session_duration }}"
          SLEEP_SECONDS=$(( SESSION_DURATION * 60 ))
          echo "⏳ Il Mac rimarrà acceso per $SESSION_DURATION minuti..."
          sleep $SLEEP_SECONDS
