name: Mac OS Nativo Libero

on:
  workflow_dispatch:

jobs:
  macos-desktop:
    runs-on: macos-latest
    timeout-minutes: 60

    steps:
      # ─── 1. Attiva lo Screen Sharing nativo del Mac ──────────────────────
      - name: Enable Apple Remote Desktop
        run: |
          sudo /System/Library/CoreServices/RemoteManagement/ARDAgent.app/Contents/Resources/kickstart -activate -configure -access -on -restart -agent -privs -all
          sudo /System/Library/CoreServices/RemoteManagement/ARDAgent.app/Contents/Resources/kickstart -configure -clientopts -setvncpasswd -vncpasswd Simona26
          echo "✅ VNC Apple attivo sulla porta 5900!"

      # ─── 2. Installa l'interfaccia Web per il VNC (noVNC) ─────────────────
      - name: Install Web VNC Interface
        run: |
          brew install node
          npm install -g websockify
          git clone --depth 1 https://github.com/novnc/noVNC.git $HOME/noVNC
          cp $HOME/noVNC/vnc.html $HOME/noVNC/index.html
          # Avvia il proxy web sulla porta 6080 che punta al VNC del Mac
          nohup websockify --web=$HOME/noVNC 6080 localhost:5900 </dev/null >/tmp/websockify.log 2>&1 &
          sleep 5

      # ─── 3. Avvia il Tunnel Libero con Pinggy (Niente chiavi o carte) ─────
      - name: Start Pinggy Tunnel
        run: |
          # Pinggy crea un tunnel HTTP perfetto sulla porta 6080 usando solo SSH standard senza autenticazione obbligatoria
          nohup ssh -o StrictHostKeyChecking=no -p 443 -R 0:localhost:6080 qr@a.pinggy.io </dev/null >/tmp/tunnel.log 2>&1 &
          sleep 10

      # ─── 4. Estrai il link finale e stampalo ─────────────────────────────
      - name: Get Connection Link
        run: |
          cat /tmp/tunnel.log
          # Estraiamo l'URL pubblico https generato da Pinggy
          WEB_URL=$(grep -oE "https://[a-zA-Z0-9.-]+\.a\.pinggy\.io" /tmp/tunnel.log | head -n 1)
          
          echo "╔══════════════════════════════════════════════════════════════╗"
          echo "║       🍏 IL TUO VERO MAC OS VIA WEB È PRONTO!                ║"
          echo "╠══════════════════════════════════════════════════════════════╣"
          echo "║                                                              ║"
          echo "║  Apri questo link direttamente sul browser del tuo iPhone:  ║"
          echo "║                                                              ║"
          echo "║  👉 $WEB_URL/index.html?autoconnect=true&password=Simona26   ║"
          echo "║                                                              ║"
          echo "╚══════════════════════════════════════════════════════════════╝"

      # ─── 5. Mantieni vivo il Mac ─────────────────────────────────────────
      - name: Keep Alive
        run: sleep 3600
