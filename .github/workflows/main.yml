name: macOS Sequoia - AnyDesk

on: workflow_dispatch

jobs:
  anydesk:
    runs-on: macos-15
    timeout-minutes: 360

    steps:
      - name: Abilita Remote Management
        run: |
          sudo /System/Library/CoreServices/RemoteManagement/ARDAgent.app/Contents/Resources/kickstart \
            -activate -configure -access -on -restart -agent -menu
          sudo /System/Library/CoreServices/RemoteManagement/ARDAgent.app/Contents/Resources/kickstart \
            -configure -allowAccessFor -allUsers -privs -all

      - name: Installa AnyDesk
        run: |
          curl -L -o AnyDesk.dmg "https://download.anydesk.com/mac/AnyDesk.dmg"
          sudo hdiutil attach AnyDesk.dmg -nobrowse
          sudo cp -R /Volumes/AnyDesk/AnyDesk.app /Applications/
          sudo hdiutil detach /Volumes/AnyDesk
          sudo xattr -d com.apple.quarantine /Applications/AnyDesk.app 2>/dev/null || true

      - name: Configura e avvia AnyDesk
        run: |
          # Imposta password per AnyDesk
          PASSWORD="${{ secrets.ANYDESK_PASSWORD || 'password123' }}"
          
          # Crea il file di configurazione
          mkdir -p ~/Library/Application\ Support/AnyDesk
          
          cat > ~/Library/Application\ Support/AnyDesk/user.conf << EOF
          [settings]
          password=$PASSWORD
          EOF
          
          # Avvia AnyDesk
          open /Applications/AnyDesk.app &
          sleep 15
          
          # Leggi ID AnyDesk
          ANYDESK_ID=$(defaults read ~/Library/Preferences/com.philandro.anydesk.plist "AdDisplayID" 2>/dev/null || echo "CONTROLLA L'APP")
          
          echo "========================================="
          echo "✅ macOS Sequoia pronto!"
          echo "========================================="
          echo "🔑 AnyDesk ID: $ANYDESK_ID"
          echo "🔐 Password: $PASSWORD"
          echo "⏱️  Durata: 6 ore"
          echo "========================================="
          echo ""
          echo "📌 Per connetterti:"
          echo "   1. Apri AnyDesk sul tuo computer"
          echo "   2. Inserisci l'ID: $ANYDESK_ID"
          echo "   3. Inserisci la password: $PASSWORD"
          
          sleep 21600
