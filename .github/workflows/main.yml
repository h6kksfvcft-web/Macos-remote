name: Windows VM with AnyDesk

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install AnyDesk
        shell: powershell
        run: |
          Invoke-WebRequest -Uri "https://download.anydesk.com/AnyDesk.exe" -OutFile "$env:TEMP\AnyDesk.exe"
          Start-Process -FilePath "$env:TEMP\AnyDesk.exe" -ArgumentList "--install `"C:\Program Files (x86)\AnyDesk`" --start-with-win --silent" -Wait

          # Check that the service actually started
          Start-Sleep -Seconds 10
          Get-Service | Where-Object { $_.Name -like "*anydesk*" } | Format-List
          Get-Process | Where-Object { $_.Name -like "*anydesk*" }

      - name: Set password
        shell: powershell
        run: |
          $exe = "C:\Program Files (x86)\AnyDesk\AnyDesk.exe"
          Start-Sleep -Seconds 10

          $pw = "${{ secrets.ANYDESK_PASSWORD }}"
          & $exe --set-password=$pw
          Write-Host "Password set command executed"

      - name: Show ID
        shell: powershell
        run: |
          $confPath = "C:\ProgramData\AnyDesk\system.conf"

          for ($i = 0; $i -lt 12; $i++) {
            if (Test-Path $confPath) {
              $line = Select-String -Path $confPath -Pattern "ad.anynet.id"
              if ($line) {
                Write-Host "===================================="
                Write-Host "Config line found: $line"
                Write-Host "===================================="
                break
              }
            }
            Write-Host "Attempt $i - conf file not ready yet"
            Start-Sleep -Seconds 10
          }

          # Fallback: try the CLI too, just in case
          $exe = "C:\Program Files (x86)\AnyDesk\AnyDesk.exe"
          $id = & $exe --get-id
          Write-Host "CLI get-id output: '$id'"

      - name: Keep VM alive
        shell: powershell
        run: Start-Sleep -Seconds 3600   # 1 hour, adjust as needed
