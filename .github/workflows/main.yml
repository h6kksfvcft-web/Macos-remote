name: Pure Native macOS Cloud

on:
  workflow_dispatch:
    inputs:
      session_duration:
        description: "Durata in minuti"
        required: false
        default: "30"
        type: string
      vnc_password:
        description: "Password d'accesso"
        required: false
        default: "SimoneLia2026"
        type: string

jobs:
  native-apple:
    runs-on: macos-latest
    timeout-minutes: 60

    steps:
      # ─── 1. Installa solo Ngrok (Docker è già presente sul Mac di GitHub) ───
      - name: Install Ngrok on macOS
        run: |
          brew install ngrok

      # ─── 2. Avvia una sessione Linux Desktop Desktop super stabile via Docker ───
      - name: Start Virtual Desktop Environment
        run: |
          # Lanciamo un container grafico pronto all'uso con la tua password configurata
          docker run -d -p 6080:80 -e VNC_PW="${{ github.event.inputs.vnc_password }}" --vnc :1 dorowu/ubuntu-desktop-lxde-vnc
          sleep 10

      # ─── 3. Connetti il Tunnel Ngrok ──────────────────────────────────────
      - name: Connect Ngrok Tunnel
        run: |
          ngrok config add-authtoken "3EoMAQM9GPofB8ve0Ur2rgD5K8t_2tqfrr56vyM8QNhUNiELX"
          nohup ngrok http 6080 </dev/null >/tmp/ngrok.log 2>&1 &
          sleep 12
          
          URL=$(curl -s http://localhost:4040/api/tunnels | python3 -c "import sys, json; print(json.load(sys.stdin)['tunnels'][0]['public_url'])" 2>/dev/null || echo "ERROR")
          
          if [ "$URL" = "ERROR" ] || [ -z "$URL" ]; then
            echo "❌ Errore tunnel Ngrok:"
            cat /tmp/ngrok.log
            exit 1
          fi
          
          CLEAN_URL=$(echo "$URL" | sed 's/http:\/\//https:\/\//g')
          echo "TUNNEL_URL=$CLEAN_URL" >> "$GITHUB_ENV"
          echo "VNC_PASS=${{ github.event.inputs.vnc_password }}" >> "$GITHUB_ENV"

      # ─── 4. Mostra il link di connessione finale ──────────────────────────
      - name: Display Connection Link
        run: |
          echo "╔══════════════════════════════════════════════════════════════╗"
          echo "║       🍏 IL TUO DESKTOP VIRTUALE È IN LINEA!                 ║"
          echo "╠══════════════════════════════════════════════════════════════╣"
          echo "║                                                              ║"
          echo "║  👉 ${TUNNEL_URL}/index.html?autoconnect=true&password=${VNC_PASS}"
          echo "║                                                              ║"
          echo "╚══════════════════════════════════════════════════════════════╝"

      # ─── 5. Mantieni attiva la sessione ───────────────────────────────────
      - name: Keep Environment alive
        run: |
          SESSION_DURATION="${{ github.event.inputs.session_duration }}"
          SLEEP_SECONDS=$(( SESSION_DURATION * 60 ))
          sleep $SLEEP_SECONDS
