name: Windows Server Info

on:
  workflow_dispatch:
  push:

jobs:
  system-info:
    runs-on: windows-2022

    steps:
      - name: Clona il repository
        uses: actions/checkout@v4

      - name: Mostra informazioni di sistema
        shell: pwsh
        run: |
          systeminfo
          Get-ComputerInfo | Select-Object WindowsProductName, WindowsVersion, OsBuildNumber

      - name: Mostra la versione di Windows
        shell: cmd
        run: |
          ver

      - name: Fine
        run: echo Workflow completato con successo!
