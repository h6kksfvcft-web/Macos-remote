name: GUI macOS 26 Infallibile

on: 
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  gui-mac:
    runs-on: macos-26

    steps:
      - name: Checkout del codice
        uses: actions/checkout@v4.2.2

      - name: Configura Password di Accesso
        run: |
          DYNAMIC_PASS=$(openssl rand -base64 9 | tr -dc 'a-zA-Z0-9')
          
          # Scrive la password direttamente nella pagina di riepilogo principale di GitHub
          echo "# 🔐 LA TUA PASSWORD GRAFICA: $DYNAMIC_PASS" >> $GITHUB_STEP_SUMMARY
          echo "Username da usare: runner" >> $GITHUB_STEP_SUMMARY
          
          sudo defaults write /Library/Preferences/com.apple.VNCSettings.txt Password -string "$DYNAMIC_PASS"
          sudo launchctl load -w /System/Library/LaunchDaemons/com.apple.screensharing.plist 2>/dev/null || true

      - name: Avvia il Tunnel per la GUI
        uses: mxschmitt/action-tmate@v3
        with:
          limit-access-to-actor: false
