name: Pure Native macOS Cloud

on:
  workflow_dispatch:
    inputs:
      session_duration:
        description: "Durata in minuti"
        required: false
        default: "60"
        type: string
      vnc_password:
        description: "Password (Esattamente 8 caratteri)"
        required: false
        default: "Simona26"
        type: string

jobs:
  native-apple:
    runs-on: macos-latest
    timeout-minutes: 65

    steps:
      # ─── 1. Installa i pacchetti necessari ───────────────────────────────
      - name: Install Network Tools
        run: |
          brew install ngrok
          pip3 install websockify --break-system-packages

      # ─── 2. Attiva lo Screen Sharing Ufficiale Apple ──────────────────────
      - name: Enable Native macOS Screen Sharing
        run: |
          sudo /usr/libexec/ApplicationFirewall/socketfilterfw --setglobalstate off
          
          # Configuriamo i database di Apple per il VNC classico (password di 8 caratteri)
          sudo defaults write /Library/Preferences/com.apple.RemoteManagement VNCAlwaysMultiUser -bool true
          sudo defaults write /Library/Preferences/com.apple.RemoteManagement VNCAcceptAllConnections -bool true
          
          # Impostiamo la password VNC legacy (Massimo 8 caratteri)
          sudo /System/Library/CoreServices/RemoteManagement/ARDAgent.app/Contents/Resources/kickstart \
            -configure -clientopts -setvnclegacy yes
            
          sudo /System/Library/CoreServices/RemoteManagement/ARDAgent.app/Contents/Resources/kickstart \
            -configure -clientopts -setvncpw "${{ github.event.inputs.vnc_password }}"
          
          # Abilitiamo l'accesso a tutti gli utenti
          sudo /System/Library/CoreServices/RemoteManagement/ARDAgent.app/Contents/Resources/kickstart \
            -configure -access -on -privs -all -allowAccessFor -allUsers
          
          # Attiviamo e riavviamo l'agente grafico
          sudo /System/Library/CoreServices/RemoteManagement/ARDAgent.app/Contents/Resources/kickstart \
            -activate -restart -agent
          
          echo "✅ Server Apple pronto sulla porta 5900!"

      # ─── 3. Configura l'interfaccia web noVNC (Ottimizzata) ───────────────
      - name: Setup Web Interface View
        run: |
          git clone --depth 1 https://github.com/novnc/noVNC.git /tmp/noVNC
          cp /tmp/noVNC/vnc.html /tmp/noVNC/index.html
          
          # Colleghiamo websockify gestendo correttamente i pacchetti grafici locali
          nohup websockify --web=/tmp/noVNC/ 6080 127.0.0.1:5900 </dev/null >/tmp/websockify.log 2>&1 &
          sleep 3

      # ─── 4. Connetti il Tunnel Ngrok in modalità HTTP (Gratuita) ──────────
      - name: Connect Ngrok HTTP Tunnel
        run: |
          ngrok config add-authtoken "3EoMAQM9GPofB8ve0Ur2rgD5K8t_2tqfrr56vyM8QNhUNiELX"
          
          nohup ngrok http 6080 </dev/null >/tmp/ngrok.log 2>&1 &
          sleep 15
          
          URL=$(curl -s http://localhost:4040/api/tunnels | python3 -c "import sys, json; print(json.load(sys.stdin)['tunnels'][0]['public_url'])" 2>/dev/null || echo "ERROR")
          
          if [ "$URL" = "ERROR" ] || [ -z "$URL" ]; then
            echo "❌ Errore tunnel Ngrok:"
            cat /tmp/ngrok.log
            exit 1
          fi
          
          CLEAN_URL=$(echo "$URL" | sed 's/http:\/\//https:\/\//g')
          echo "TUNNEL_URL=$CLEAN_URL" >> "$GITHUB_ENV"
          echo "VNC_PASS=${{ github.event.inputs.vnc_password }}" >> "$GITHUB_ENV"

      # ─── 5. Mostra il link di connessione finale ──────────────────────────
      - name: Display Connection Link
        run: |
          echo "╔══════════════════════════════════════════════════════════════╗"
          echo "║       🍏 IL TUO AMBIENTE DI TEST MAC OS È IN LINEA!          ║"
          echo "╠══════════════════════════════════════════════════════════════╣"
          echo "║                                                              ║"
          echo "║  👉 ${TUNNEL_URL}/index.html?autoconnect=true&password=${VNC_PASS}"
          echo "║                                                              ║"
          echo "╚══════════════════════════════════════════════════════════════╝"

      # ─── 6. Mantieni attiva la sessione ───────────────────────────────────
      - name: Keep macOS alive
        run: |
          SESSION_DURATION="${{ github.event.inputs.session_duration }}"
          SLEEP_SECONDS=$(( SESSION_DURATION * 60 ))
          echo "⏳ Il Mac rimarrà acceso per $SESSION_DURATION minuti..."
          sleep $SLEEP_SECONDS
