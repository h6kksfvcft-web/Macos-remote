name: Mac OS Nativo Libero

on:
  workflow_dispatch:

jobs:
  macos-desktop:
    runs-on: macos-latest
    timeout-minutes: 60

    steps:
      # ─── 1. Attiva il VNC nativo di Apple ────────────────────────────────
      - name: Enable Apple Remote Desktop
        run: |
          sudo /System/Library/CoreServices/RemoteManagement/ARDAgent.app/Contents/Resources/kickstart -activate -configure -access -on -restart -agent -privs -all
          sudo /System/Library/CoreServices/RemoteManagement/ARDAgent.app/Contents/Resources/kickstart -configure -clientopts -setvncpasswd -vncpasswd Simona26
          echo "✅ Screen Sharing Apple attivo sulla porta 5900!"

      # ─── 2. Apri il tunnel con Serveo su porta fissa ─────────────────────
      - name: Start Free Serveo Tunnel
        run: |
          # Chiediamo esplicitamente a serveo di mappare la porta 15900 remota sulla nostra 5900 locale
          # Il flag -N risolve il problema dello pseudo-terminale
          nohup ssh -o StrictHostKeyChecking=no -N -R 15900:localhost:5900 serveo.net </dev/null >/tmp/serveo.log 2>&1 &
          sleep 10

      # ─── 3. Controlla e Mostra i dati di connessione ─────────────────────
      - name: Get Connection Link
        run: |
          cat /tmp/serveo.log
          echo "╔══════════════════════════════════════════════════════════════╗"
          echo "║       🍏 IL TUO VERO MAC OS IN CLOUD È PRONTO!               ║"
          echo "╠══════════════════════════════════════════════════════════════╣"
          echo "║                                                              ║"
          echo "║  Apri l'app VNC Viewer sul tuo iPhone e inserisci:           ║"
          echo "║                                                              ║"
          echo "║  👉 INDIRIZZO:  serveo.net:15900                             ║"
          echo "║  👉 PASSWORD:   Simona26                                     ║"
          echo "║                                                              ║"
          echo "╚══════════════════════════════════════════════════════════════╝"

      # ─── 4. Mantieni vivo il Mac ─────────────────────────────────────────
      - name: Keep Alive
        run: sleep 3600
