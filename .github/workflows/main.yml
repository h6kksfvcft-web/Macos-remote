name: Mac OS con Tmate Libero

on:
  workflow_dispatch:

jobs:
  macos-desktop:
    runs-on: macos-latest
    timeout-minutes: 60

    steps:
      # ─── 1. Attiva lo Screen Sharing nativo di Apple (1 secondo) ─────────
      - name: Enable Apple Remote Desktop
        run: |
          sudo /System/Library/CoreServices/RemoteManagement/ARDAgent.app/Contents/Resources/kickstart -activate -configure -access -on -restart -agent -privs -all
          sudo /System/Library/CoreServices/RemoteManagement/ARDAgent.app/Contents/Resources/kickstart -configure -clientopts -setvncpasswd -vncpasswd Simona26
          echo "✅ VNC Apple pronto!"

      # ─── 2. Installa e lancia tmate (Zero registrazioni, Zero carte) ──────
      - name: Setup tmate Session
        run: |
          brew install tmate
          # Avvia tmate in background creando una sessione pulita
          tmate -S /tmp/tmate.sock new-session -d
          tmate -S /tmp/tmate.sock wait-options
          
          # Recupera la stringa di connessione SSH/TCP
          TMATE_SSH=$(tmate -S /tmp/tmate.sock display -p '#{tmate_ssh}')
          
          # Estraiamo l'host e la porta (tmate ci dà qualcosa tipo: ssh -p 22222 uncodice@lon1.tmate.io)
          # Lo trasformiamo nel formato pulito che serve a noi
          SERVER_INFO=$(echo "$TMATE_SSH" | sed 's/ssh -p //')
          PORT=$(echo "$SERVER_INFO" | awk '{print $1}')
          HOST_USER=$(echo "$SERVER_INFO" | awk '{print $2}')
          HOST=$(echo "$HOST_USER" | cut -d'@' -f2)
          USER=$(echo "$HOST_USER" | cut -d'@' -f1)

          echo "╔══════════════════════════════════════════════════════════════╗"
          echo "║       🍏 MAC OS IN CLOUD - METODO INDISTRUTTIBILE            ║"
          echo "╠══════════════════════════════════════════════════════════════╣"
          echo "║                                                              ║"
          echo "║  1. Apri l'app VNC Viewer sul tuo iPhone                     ║"
          echo "║  2. Inserisci questo indirizzo esatto:                       ║"
          echo "║                                                              ║"
          echo "║  👉 INDIRIZZO:  $HOST:$PORT                                  ║"
          echo "║  👉 PASSWORD:   Simona26                                     ║"
          echo "║                                                              ║"
          echo "╚══════════════════════════════════════════════════════════════╝"

      # ─── 3. Mantieni vivo il Mac ─────────────────────────────────────────
      - name: Keep Alive
        run: sleep 3600
